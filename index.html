<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickAdmissionGH</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Inter',system-ui,Arial,sans-serif;background:#0c1f1a}
  .qa-tabs{position:fixed;top:0;left:0;right:0;height:44px;z-index:100000;display:flex;align-items:center;gap:6px;
    padding:0 12px;background:#0c2a22;border-bottom:1px solid #1e4f40;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .qa-brand{font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:14px;letter-spacing:.02em;margin-right:14px;white-space:nowrap}
  .qa-tab{appearance:none;border:1px solid transparent;background:transparent;color:#9fc7ba;font-size:13px;font-weight:600;
    padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit}
  .qa-tab:hover{color:#fff;background:rgba(255,255,255,.06)}

  .qa-super{position:fixed;bottom:9px;left:12px;z-index:100001;font-size:11px;color:#7f99b0;background:transparent;border:0;cursor:pointer;opacity:.45;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
  .qa-super:hover{opacity:1;color:#115E4A;text-decoration:underline}
  .qa-stack{position:fixed;top:44px;left:0;right:0;bottom:0}
  .app-frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#fff}
  .app-frame.active{display:block}
  @media(max-width:520px){.qa-brand{font-size:12px;margin-right:6px}.qa-tab{padding:6px 9px;font-size:12px}}
</style>
</head>
<body>
  <div class="qa-tabs">
    <span class="qa-brand">QuickAdmissionGH</span>
    <button class="qa-tab active" data-t="student" onclick="qaShow('student')">Student Portal</button>
    <button class="qa-tab" data-t="school" onclick="qaShow('school')">School Admin</button>
  </div>
  <button class="qa-super" data-t="super" onclick="qaShow('super')">&#9881; Super Admin</button>
  <div class="qa-stack">
    <iframe class="app-frame active" id="frame-student" data-t="student" srcdoc="<!DOCTYPE html>
<html lang=&quot;en&quot;>
<head>
<meta charset=&quot;UTF-8&quot;>
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;>
<title>QuickAdmissionGH</title>
<link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;>
<link href=&quot;https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap&quot; rel=&quot;stylesheet&quot;>
<script src=&quot;https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js&quot;></script>
<script src=&quot;https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js&quot;></script>
<script src=&quot;https://js.paystack.co/v1/inline.js&quot;></script>
<style>
  :root{
    --bg:#EBEEEC;--surface:#FFFFFF;--surface-2:#F6F8F7;
    --ink:#14201C;--ink-soft:#46554F;--muted:#8A9893;--line:#E1E7E4;
    --primary:#115E4A;--primary-deep:#0C4537;--primary-soft:#E4F0EB;
    --accent:#D2941A;--accent-soft:#FBF1DC;--accent-ink:#7a5409;
    --danger:#B23A3A;--danger-soft:#F6E5E5;--info:#3066A3;--info-soft:#E6EEF6;
    --sb:#13201C;--sb-soft:#1C2C27;--sb-text:#A9B8B2;--sb-active:#1E4F40;
    --r:12px;--r-sm:8px;--shadow:0 1px 2px rgba(20,32,28,.05),0 10px 30px -14px rgba(20,32,28,.2);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:var(--primary);text-decoration:none;font-weight:600}a:hover{text-decoration:underline}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:var(--r-sm);font-weight:600;font-size:14px;transition:.15s;white-space:nowrap}
  .btn svg{width:16px;height:16px}
  .btn-block{width:100%}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-deep)}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{background:#eef2f0}
  .btn-accent{background:var(--accent);color:#3a2906}.btn-accent:hover{filter:brightness(.96)}
  .btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:8px 13px;font-size:13px}
  .screen{display:none;min-height:100vh}.screen.active{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ===== AUTH ===== */
  .auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px 16px 56px;background:radial-gradient(120% 80% at 50% -10%,rgba(17,94,74,.10),transparent 60%),linear-gradient(180deg,#e6ebe8,#EBEEEC)}
  .auth-card{width:100%;max-width:460px}
  .crest{width:54px;height:54px;border-radius:14px;margin:0 auto 8px;display:grid;place-items:center;background:linear-gradient(150deg,var(--primary),#1a7a5f);color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:20px;box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.12)}
  .auth-head{text-align:center;margin-bottom:12px}
  .auth-head h1{font-family:'Space Grotesk';font-size:23px;font-weight:600;letter-spacing:-.3px;line-height:1.2}
  .auth-head .tag{display:inline-block;margin-top:8px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);background:var(--primary-soft);padding:4px 12px;border-radius:20px}
  /* ===== Landing corner links + hero ===== */
  .corner-nav{position:fixed;top:14px;right:16px;z-index:70;display:flex;gap:8px}
  .corner-nav a{font-size:12px;font-weight:600;color:var(--primary);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:8px 15px;text-decoration:none;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:7px}
  .corner-nav a:hover{background:var(--primary-soft)}
  .corner-nav svg{width:15px;height:15px}
  .super-link{position:fixed;bottom:56px;right:16px;z-index:70;font-size:11px;color:#9aa6a1;text-decoration:none;opacity:.55;display:inline-flex;align-items:center;gap:5px}
  .super-link:hover{opacity:1;color:var(--primary)}
  .super-link svg{width:13px;height:13px}
  .auth-split{width:100%;max-width:1000px;display:grid;grid-template-columns:.9fr 1.1fr;gap:34px;align-items:start}
  .auth-hero .auth-head{text-align:left;margin-bottom:10px}
  .auth-hero .auth-head .crest{margin-left:0}
  .auth-hero .hero-img{width:100%;height:auto;max-height:40vh;object-fit:contain;border-radius:16px;box-shadow:var(--shadow);display:block;margin-top:8px}
  .auth-hero h2{font-family:'Space Grotesk';font-size:26px;line-height:1.05;font-weight:700;margin:0 0 5px;color:var(--ink)}
  .auth-hero h2 .grn{color:var(--primary)}
  .auth-hero p.lead{font-size:13px;color:var(--ink-soft);margin:0;font-weight:500}
  .hero-feats{display:flex;flex-wrap:wrap;gap:10px}
  .hero-feat{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:10px 14px;box-shadow:var(--shadow)}
  .hero-feat svg{width:20px;height:20px;color:var(--primary);flex:none}
  .hero-feat b{font-family:'Space Grotesk';font-size:13px;display:block;line-height:1.1}
  .hero-feat small{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  .hero-upload{margin-top:14px;font-size:11.5px;color:var(--muted)}
  .hero-upload label{color:var(--primary);cursor:pointer;text-decoration:underline;font-weight:600}
  @media(max-width:860px){.auth-split{grid-template-columns:1fr;max-width:460px;gap:18px}.auth-hero h2{font-size:24px}.auth-hero{order:1}.auth-card{order:2}.auth-hero .hero-img{max-height:32vh}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
  .notice{border-radius:var(--r-sm);padding:9px 12px;font-size:11.5px;line-height:1.4;margin-bottom:9px;border:1px solid}
  .notice b{font-weight:600}
  .notice.warn{background:var(--accent-soft);border-color:#f0dcae;color:var(--accent-ink)}
  .notice.info{background:var(--info-soft);border-color:#cfdeed;color:#274d77}
  .charge{font-family:'JetBrains Mono';font-weight:600}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  .field .hint{font-size:11.5px;color:var(--muted);font-weight:400}
  input,select,textarea{font-family:inherit;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);width:100%;transition:.14s}
  input::placeholder{color:#aab4af}textarea{resize:vertical;min-height:64px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .input-mono{font-family:'JetBrains Mono';letter-spacing:.08em;text-transform:uppercase}
  .field.err input{border-color:var(--danger);box-shadow:0 0 0 3px var(--danger-soft)}
  .err-msg{color:var(--danger);font-size:12px;font-weight:500;display:none}.field.err .err-msg{display:block}
  .token-field{display:flex;gap:8px}.token-field input{flex:1}
  .divider{display:flex;align-items:center;gap:12px;margin:11px 0;color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .divider::before,.divider::after{content:&quot;&quot;;height:1px;background:var(--line);flex:1}
  .auth-links{margin-top:18px;display:flex;flex-direction:column;gap:9px;text-align:center;font-size:13px}
  .helpline{text-align:center;margin-top:11px;font-size:12px;color:var(--muted)}.helpline a{font-family:'JetBrains Mono'}
  .auth-foot{text-align:center;margin-top:24px;font-size:11px;color:var(--muted)}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;margin-bottom:16px;color:var(--ink-soft)}.back-link svg{width:15px;height:15px}
  .token-show{text-align:center;padding:22px;background:var(--primary-soft);border-radius:var(--r);margin:6px 0 16px}
  .token-show small{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);font-weight:600}
  .token-show .tk{font-family:'Space Grotesk';font-size:30px;font-weight:700;letter-spacing:5px;color:var(--primary-deep);margin-top:6px}
  .pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .pay-opt{display:flex;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);border-radius:var(--r-sm);font-weight:600;font-size:13px;transition:.14s;background:var(--surface)}
  .pay-opt:hover{border-color:var(--primary);background:var(--primary-soft)}
  .pay-opt .b{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:#fff;font-family:'Space Grotesk';font-size:13px;flex:none}

  /* ===== PORTAL SHELL ===== */
  .ptopbar{display:flex;align-items:center;gap:14px;background:#e6ddd1;border-bottom:1px solid #d8cdbb;padding:11px 20px;position:sticky;top:0;z-index:30}
  .ptopbar .ham{width:38px;height:38px;border-radius:8px;display:none;place-items:center;background:rgba(0,0,0,.05)}
  .ptopbar .ham svg{width:18px;height:18px}
  .ptopbar .sch{font-family:'Space Grotesk';font-weight:700;font-size:16px;color:#1b3a30;text-shadow:.04em .04em 0 rgba(120,150,160,.4)}
  .ptopbar .yr{margin-left:auto;font-weight:700;font-size:12.5px;color:var(--danger);white-space:nowrap}
  .ptopbar .out{width:38px;height:38px;border-radius:8px;display:grid;place-items:center;background:rgba(0,0,0,.05);color:#1b3a30}
  .ptopbar .out svg{width:17px;height:17px}
  .pbody{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 61px)}
  .psidebar{background:var(--sb);color:var(--sb-text);padding:0 0 20px;position:sticky;top:61px;height:calc(100vh - 61px);overflow-y:auto}
  .pstud{display:flex;align-items:center;gap:11px;padding:16px 16px;border-bottom:1px solid #21322c}
  .pstud img,.pstud .ph{width:42px;height:42px;border-radius:50%;flex:none;object-fit:cover;background:var(--accent);color:#3a2906;display:grid;place-items:center;font-weight:700;font-size:15px}
  .pstud .nm{font-size:12.5px;font-weight:600;color:#fff;line-height:1.2}
  .pnav{padding:10px}
  .pnav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 11px;border-radius:var(--r-sm);color:var(--sb-text);font-size:13.5px;font-weight:500;transition:.14s}
  .pnav button svg{width:17px;height:17px;flex:none;opacity:.85}
  .pnav button:hover{background:var(--sb-soft);color:#e7efec}
  .pnav button.active{background:var(--sb-active);color:#fff}
  .pcrest{text-align:center;padding:18px}
  .pcrest .cb{width:120px;height:90px;margin:0 auto;border:6px double #3a4a44;border-radius:6px;display:grid;place-items:center;background:#1c2c27;color:#6f857c;font-family:'Space Grotesk';font-weight:700;font-size:13px}
  .pmain{padding:22px;max-width:1000px}

  /* welcome */
  .welcome{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .welcome .wh{background:var(--primary);color:#fff;padding:13px 18px;font-size:13.5px;font-weight:600;line-height:1.45}
  .welcome.pending .wh{background:var(--accent);color:#3a2906}

  /* widget-user */
  .wu{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .wu-head{height:118px;background:linear-gradient(135deg,#1a7a5f,var(--primary));position:relative;text-align:center;color:#fff;padding-top:22px}
  .wu-head h3{font-family:'Space Grotesk';font-size:18px;font-weight:600;padding:0 16px}
  .wu-head .sno{font-size:12.5px;opacity:.9;margin-top:2px}
  .wu-avatar{width:88px;height:88px;border-radius:50%;border:3px solid #fff;background:var(--accent);color:#3a2906;font-family:'Space Grotesk';font-weight:700;font-size:30px;display:grid;place-items:center;position:absolute;left:50%;top:74px;transform:translateX(-50%);object-fit:cover}
  .wu-grid{display:grid;grid-template-columns:repeat(3,1fr);padding-top:54px}
  .wu-block{padding:16px 12px;text-align:center;border-right:1px solid var(--line);border-top:1px solid var(--line)}
  .wu-block:nth-child(3n){border-right:none}
  .wu-block .h{font-family:'Space Grotesk';font-weight:600;font-size:14px;color:var(--ink);min-height:20px;word-break:break-word}
  .wu-block .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-top:5px}
  .wu-block .btn{margin-top:4px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px}
  .pill.ok{background:var(--primary-soft);color:var(--primary)}
  .pill.pend{background:var(--accent-soft);color:var(--accent-ink)}

  /* documents */
  .docs{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}
  .docs h3{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin-bottom:4px}
  .docs .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
  .doc-btns{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  .doc-btns .btn{flex:1;min-width:200px}
  .report-box{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px}
  .report-box .rt{color:var(--danger);font-weight:600;font-size:13px;margin-bottom:10px}
  .checklist{list-style:none}
  .checklist li{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .checklist li:last-child{border-bottom:none}
  .checklist .n{width:22px;height:22px;border-radius:6px;background:var(--primary-soft);color:var(--primary);font-family:'JetBrains Mono';font-size:11px;font-weight:600;display:grid;place-items:center;flex:none}
  .report-box .warn{color:var(--danger);font-weight:600;font-size:12.5px;margin-top:12px}

  /* ===== FORM WIZARD ===== */
  .form-wrap{display:grid;grid-template-columns:230px 1fr;gap:24px;align-items:start}
  .rail h4{font-family:'Space Grotesk';font-size:13px;font-weight:600;margin-bottom:4px}
  .rail .pct{font-size:12px;color:var(--muted);margin-bottom:14px}
  .progress-line{height:6px;border-radius:4px;background:var(--line);overflow:hidden;margin-bottom:18px}
  .progress-line i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#1a7a5f);border-radius:4px;transition:width .4s}
  .steps{list-style:none;position:relative}
  .steps::before{content:&quot;&quot;;position:absolute;left:13px;top:14px;bottom:14px;width:2px;background:var(--line)}
  .step{display:flex;gap:12px;align-items:flex-start;padding:7px 0;position:relative;cursor:pointer}
  .step .dot{width:28px;height:28px;border-radius:50%;background:var(--surface);border:2px solid var(--line);display:grid;place-items:center;flex:none;z-index:1;font-size:12px;font-weight:600;color:var(--muted);transition:.2s}
  .step .dot svg{width:13px;height:13px;color:#fff}
  .step .lbl{font-size:13px;font-weight:600;color:var(--ink-soft);padding-top:4px}
  .step.active .dot{border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .step.active .lbl{color:var(--primary)}
  .step.done .dot{background:var(--primary);border-color:var(--primary)}
  .step.done .lbl{color:var(--ink)}
  .stepcard{display:none}.stepcard.active{display:block;animation:fade .25s}
  .card2{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .card2-head{padding:20px 24px;border-bottom:1px solid var(--line)}
  .card2-head h2{font-family:'Space Grotesk';font-size:18px;font-weight:600}
  .card2-head p{font-size:13px;color:var(--muted);margin-top:3px}
  .card2-body{padding:24px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
  .sub-h{font-family:'Space Grotesk';font-weight:600;font-size:14px;margin:20px 0 12px;padding-top:18px;border-top:1px solid var(--line)}
  .sub-h:first-child{margin-top:0;padding-top:0;border-top:none}
  .step-nav{display:flex;gap:12px;justify-content:space-between;margin-top:8px}
  .step-nav .btn{min-width:120px}
  .prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .prog-card{border:1.5px solid var(--line);border-radius:var(--r-sm);padding:15px;cursor:pointer;transition:.15s}
  .prog-card:hover{border-color:var(--primary)}.prog-card.sel{border-color:var(--primary);background:var(--primary-soft)}
  .prog-card .pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .prog-card .pc-code{font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--primary);background:var(--surface);padding:2px 8px;border-radius:20px;border:1px solid var(--primary-soft)}
  .prog-card.sel .pc-code{background:#fff}
  .prog-card h4{font-family:'Space Grotesk';font-size:15px;font-weight:600}
  .prog-card .subs{font-size:12px;color:var(--ink-soft);margin-top:5px}
  .radio-tick{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex:none}
  .prog-card.sel .radio-tick{border-color:var(--primary);background:var(--primary)}
  .radio-tick svg{width:11px;height:11px;color:#fff;opacity:0}.prog-card.sel .radio-tick svg{opacity:1}
  .declare{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px;font-size:13px;line-height:1.6;color:var(--ink-soft);margin-bottom:16px}
  .check-row{display:flex;gap:11px;align-items:flex-start;cursor:pointer;font-size:13.5px;font-weight:500;padding:6px 0}
  .checkbox{width:20px;height:20px;border:2px solid var(--muted);border-radius:6px;display:grid;place-items:center;flex:none;transition:.12s;background:var(--surface);margin-top:1px}
  .checkbox.on{background:var(--primary);border-color:var(--primary)}.checkbox svg{width:12px;height:12px;color:#fff;opacity:0}.checkbox.on svg{opacity:1}
  .dropzone{border:2px dashed var(--line);border-radius:var(--r-sm);padding:30px;text-align:center;background:var(--surface-2);transition:.14s;cursor:pointer}
  .dropzone:hover{border-color:var(--primary);background:var(--primary-soft)}

  .file-done{display:flex;align-items:center;gap:11px;border:1px solid var(--primary-soft);background:var(--primary-soft);border-radius:var(--r-sm);padding:13px 15px}

  .rev-block{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:13px;overflow:hidden}  .rev-head{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;background:var(--surface-2)}

  .rev-head a{color:var(--primary)}
  .form-note{background:var(--danger-soft);border:1px solid #e6c4c4;border-left:4px solid var(--danger);color:#8a2b2b;font-size:12.5px;font-weight:600;line-height:1.5;padding:13px 15px;border-radius:var(--r-sm);margin-bottom:18px}

  .cls-row:hover{background:var(--surface-2)}

  .cls-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:none}

  .cls-combo{color:var(--ink-soft);line-height:1.5;min-width:240px}
  .cls-seats{font-family:'JetBrains Mono';font-weight:600;text-align:center}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);z-index:90;opacity:0;transition:.3s}

  .pbackdrop{display:none}

  .env-badge{position:fixed;bottom:10px;right:12px;z-index:99999;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;padding:4px 9px;border-radius:20px;background:#0C4537;color:#7FE3C2;border:1px solid #1E4F40;box-shadow:0 4px 14px -6px rgba(0,0,0,.5);pointer-events:none}

  /* ===== DISCLAIMER ===== */
  .disc-overlay{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(12,30,24,.55);backdrop-filter:blur(3px)}

  .disc-ico svg{width:21px;height:21px}
  .disc-body{padding:16px 22px;overflow-y:auto;font-size:13.5px;line-height:1.6;color:var(--ink-soft,#39504a)}

  .disc-check{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--ink,#14201c);margin-bottom:14px;cursor:pointer}

</style>
</head>

<script>

function toast(m){$('toastMsg').textContent=m;const t=$('toast');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));window.scrollTo(0,0);if(id==='s-purchase'){try{showPendingBanner();}catch(e){}}}

const initials=n=>{const w=(n||'').trim().split(' ').filter(Boolean);return ((w[0]&amp;&amp;w[0][0]||'?')+(w[1]&amp;&amp;w[1][0]||'')).toUpperCase();};

function applySchool(data){
  // data carries school + config + programmes + classes from login
  SCHOOL={school:data.school,config:data.config,classes:data.classes||[]};
  PROGRAMMES=data.programmes||[];
  if(data.school){
    $('topSchool').textContent=(data.school.name||'').toUpperCase();
    document.querySelectorAll('.helpline a').forEach(a=>{if(data.school.helpdesk){a.textContent=data.school.helpdesk;a.href='tel:'+data.school.helpdesk;}});
  }
  if(data.config) $('topYear').textContent='Admission Year: '+(data.config.academic_year||'2025/2026');
}

/* ===== LOGIN ===== */
async function doLogin(){
  const idx=$('login-index').value.trim(),tok=$('login-token').value.trim().toUpperCase();
  const sid=$('login-school').value;
  $('f-index').classList.remove('err');$('f-token').classList.remove('err');$('f-school').classList.remove('err');
  if(!sid){$('f-school').classList.add('err');return;}
  if(admissionClosed(sid)){ const b=$('admClosedBanner'); if(b)b.style.display='block'; toast('Admission is closed for this school'); return; }
  if(!idx){$('f-index').classList.add('err');return;}
  const {data,error}=await sb.rpc('student_login',{p_index:idx,p_token:tok,p_school:sid});
  if(error){toast('Login failed — '+error.message);return;}
  if(!data.ok){
    if(data.error==='index')$('f-index').classList.add('err');
    else if(data.error==='token')$('f-token').classList.add('err');
    else if(data.error==='ambiguous')toast('This index appears under more than one school — contact your school office.');
    else toast('Could not sign in');
    return;
  }
  session={index:idx,token:tok,school:sid}; STU=data.student; applySchool(data);
  hydrate(); showScreen('s-app'); showPanel('dash');
  showDisclaimer();
}
function showDisclaimer(){
  const sch=(SCHOOL&amp;&amp;SCHOOL.school&amp;&amp;SCHOOL.school.name)||&quot;your school&quot;;
  const sn=$('discSchool'); if(sn) sn.textContent=sch;
  const cb=$('discAgree'); if(cb) cb.checked=false;
  const btn=$('discBtn'); if(btn) btn.disabled=true;
  const ov=$('discOverlay'); if(ov){ ov.classList.add('show'); const b=$('discBody'); if(b) b.scrollTop=0; }
}
function acceptDisclaimer(){ const ov=$('discOverlay'); if(ov) ov.classList.remove('show'); }
function declineDisclaimer(){ const ov=$('discOverlay'); if(ov) ov.classList.remove('show'); logout(); }
async function refreshStudent(){
  const {data}=await sb.rpc('student_login',{p_index:session.index,p_token:session.token,p_school:session.school||null});
  if(data&amp;&amp;data.ok){STU=data.student;applySchool(data);hydrate();}
}
function hydrate(){
  const s=STU;
  $('sbName').textContent=s.full_name||'Applicant';
  $('sbAvatar').textContent=initials(s.full_name);
  $('wuName').textContent=s.full_name||'Applicant';
  $('wuAvatar').textContent=initials(s.full_name);
  $('wuSchoolNo').textContent='School No.: '+(s.school_no||'—');
  app.done=[s.personal_done,s.programme_done,s.undertaking_done,s.documents_done];
  app.done=s.submitted?[true,true,true]:[false,false,false];
  app.classId=s.class_id||null;
  $('pf1-index').value=s.index||''; $('pf1-gender').value=s.gender||''; $('pf1-prog').value=s.programme||'';
  $('pf1-res').value=s.residential||'—'; $('pf1-surname').value=s.surname||s.full_name||''; $('pf1-other').value=s.other_names||'';
  $('pf1-agg').value=(s.aggregate!=null?s.aggregate:'—');
  buildPickers(); buildClassTable(); prefillRecords(s.records);
  const done=s.submitted;
  $('welcomeCard').classList.toggle('pending',!done);
  $('welcomeMsg').textContent=done
    ? (s.full_name||'')+', WELL DONE! You have completed your Personal Records Form. Kindly download all the necessary documents. Thank you!'
    : (s.full_name||'')+', please complete your Personal Records Form to proceed with your admission.';
  const blocks=[
    {h:s.programme||'—',l:'Programme'},
    {h:s.residential||'—',l:'Residential Status'},
    {h:done?'<span class=&quot;pill ok&quot;>Completed</span>':'<span class=&quot;pill pend&quot;>Pending</span>',l:'Personal Records',btn:'<button class=&quot;btn btn-primary btn-sm&quot; onclick=&quot;showPanel(\'form\')&quot;><svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><path d=\'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\'/><path d=\'M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z\'/></svg>'+(done?'Edit Your Form':'Fill Your Form')+'</button>'},
    {h:s.gender||'—',l:'Gender'},
    {h:s.class||'<span style=&quot;color:var(--muted)&quot;>Not assigned</span>',l:'Class Assigned'},
    {h:s.house||'<span style=&quot;color:var(--muted)&quot;>Not assigned</span>',l:'House Assigned'},

const PENDING_KEY='qa_pending_pay';
function savePending(o){try{localStorage.setItem(PENDING_KEY,JSON.stringify(o));}catch(e){}}
function getPending(){try{return JSON.parse(localStorage.getItem(PENDING_KEY)||'null');}catch(e){return null;}}
function clearPending(){try{localStorage.removeItem(PENDING_KEY);}catch(e){}}
function showPendingBanner(){
  const p=getPending(); const el=$('p-pending'); if(!el)return;
  if(p&amp;&amp;p.reference){ el.style.display='block';
    el.innerHTML='Payment not yet confirmed (ref <b>'+p.reference+'</b>)'+(p.reason?'<br><span style=&quot;font-weight:600&quot;>Reason: '+p.reason+'</span>':'')+'.<br><a onclick=&quot;retryVerify()&quot;>Retry verification</a> \u2014 you will <b>not</b> be charged again. &amp;nbsp;·&amp;nbsp; <a onclick=&quot;dismissPending()&quot;>dismiss</a>'; }
  else el.style.display='none';
}
function dismissPending(){ clearPending(); showPendingBanner(); toast('Cleared. If you completed a payment, it stays valid \u2014 use Retrieve token.'); }
async function payToken(method){
  const idx=$('p-index').value.trim(),name=$('p-name').value.trim();
  const sid=$('p-school-sel').value;
  if(!sid){toast('Please select your school first');return;}
  if(admissionClosed(sid)){toast('Admission is closed for this school');return;}
  if(!idx||!name){toast('Enter your index number and name first');return;}
  if(method!=='Paystack'){toast(method+' isn\u2019t available yet — please use Paystack');return;}
  // recover an unconfirmed payment instead of charging again
  const pend=getPending();
  if(pend&amp;&amp;pend.index===idx&amp;&amp;pend.reference){ toast('Found an unconfirmed payment — verifying instead of charging again'); return verifyPayment(pend.reference, idx, name); }
  // already paid? then don't charge again
  const {data:has}=await sb.rpc('index_has_token',{p_index:idx,p_school:sid});
  if(has&amp;&amp;has.ok&amp;&amp;has.paid){ toast('This index has already paid. Use “Retrieve token” to get your token.'); $('r-value').value=idx; showScreen('s-retrieve'); return; }
  const {data:sch}=await sb.rpc('find_school_by_index',{p_index:idx,p_school:sid});
  if(!sch||!sch.ok){toast('This index is not on any participating school\u2019s placement list');return;}
  const amount=Math.round(Number(sch.charge||0)*100);
  if(!amount){toast('This school has no service charge set');return;}
  const email=$('p-email').value.trim()||(idx+'@noemail.qadmission');
  if(!window.PaystackPop){toast('Payment library didn\u2019t load — check your connection and reload');return;}
  toast('Opening secure payment for '+sch.name+'\u2026');
  const handler=window.PaystackPop.setup({
    key:PAYSTACK_PUBLIC_KEY, email, amount, currency:'GHS',
    metadata:{custom_fields:[
      {display_name:'Index Number',variable_name:'index',value:idx},
      {display_name:'Applicant',variable_name:'name',value:name},
      {display_name:'School',variable_name:'school',value:sch.name}
    ]},
    callback:function(resp){ savePending({reference:resp.reference,index:idx,name:name,school:sid}); verifyPayment(resp.reference, idx, name, sid); },
    onClose:function(){ toast('Payment window closed'); }
  });
  handler.openIframe();
}
function retryVerify(){ const p=getPending(); if(!p||!p.reference){toast('No pending payment found');return;} verifyPayment(p.reference,p.index,p.name||'',p.school||null); }
async function verifyPayment(reference, idx, name, school){
  toast('Verifying payment\u2026');
  if(!school){ const p=getPending(); school=(p&amp;&amp;p.school)||$('p-school-sel').value||null; }
  let data=null, netErr=null;
  try{
    const r=await fetch(SUPABASE_URL+'/functions/v1/verify-payment',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({reference,index:idx,name,phone:$('p-phone').value,email:$('p-email').value,school})
    });
    data=await r.json().catch(()=>null);
  }catch(e){ netErr=e; }
  if(!data||!data.ok){
    try{console.log('[verify-payment] response:',data,'netErr:',netErr);}catch(e){}
    let msg, reason;
    if(netErr){ reason='network error'; msg='Network problem reaching the server. Tap Retry verification.'; }
    else if(data&amp;&amp;data.error==='not_configured'){ reason='payment system not configured'; msg='Payment system key not set yet. Your payment is safe — Retry verification shortly.'; }
    else if(data&amp;&amp;data.error==='verification_failed'){
      const gs=data.gateway_status||data.gateway_message||'not found';
      reason='Paystack status \u201c'+gs+'\u201d'+(data.gateway_message&amp;&amp;data.gateway_status?(' \u2014 '+data.gateway_message):'');
      msg='Paystack says: '+gs+'. '+(gs==='abandoned'||gs==='failed'?'That payment wasn\u2019t completed — finish the card + OTP step.':'Reference not recognised on this account.');
    }
    else { reason=(data&amp;&amp;(data.message||data.gateway_message||data.error))||'unknown'; msg='Could not verify yet ('+reason+'). Tap Retry verification.'; }
    savePending({reference,index:idx,name:name||'',reason}); showPendingBanner();
    toast(msg); return;
  }
  clearPending(); showPendingBanner();
  window._newToken={idx,tk:data.token};
  toast('Payment confirmed \u2014 signing you in\u2026');
  session={index:idx,token:data.token,school:school||null};
  const {data:login}=await sb.rpc('student_login',{p_index:idx,p_token:data.token,p_school:school||null});
  if(login&amp;&amp;login.ok){ STU=login.student; applySchool(login); hydrate(); showScreen('s-app'); showPanel('dash'); showDisclaimer(); toast('Welcome! Save your token: '+data.token); }
  else { $('new-token').textContent=data.token; $('purchase-form').style.display='none'; $('purchase-done').style.display='block'; }
}
function useNewToken(){$('login-index').value=window._newToken.idx;$('login-token').value=window._newToken.tk;$('purchase-form').style.display='block';$('purchase-done').style.display='none';showScreen('s-login');toast('Token filled in — tap Log in');}
$('r-by').addEventListener('change',e=>$('r-label').textContent=e.target.value==='index'?'Index number':'Payment receipt number');
async function retrieveToken(){
  const by=$('r-by').value,v=$('r-value').value.trim(); if(!v){toast('Enter a value to search');return;}
  const rsid=$('r-school').value; if(!rsid){toast('Please select your school first');return;}

}

async function handleEnrFile(inp){
  const file=inp.files&amp;&amp;inp.files[0]; inp.value='';
  if(!file) return;
  const isJpg = file.type==='image/jpeg' || file.type==='image/jpg' || /\.jpe?g$/i.test(file.name);
  if(!isJpg){ toast('Please upload a JPG image'); return; }
  if(file.size > 2*1024*1024){ toast('File too large — max 2 MB'); return; }
  if(!STU||!session){ toast('Please log in again'); return; }
  $('enrWrap').innerHTML='<div class=&quot;dropzone&quot;><b>Uploading…</b><small>Please wait</small></div>';
  const ext = /\.jpe?g$/i.test(file.name) ? file.name.split('.').pop() : 'jpg';
  const path = (STU.index||'student')+'_'+Date.now()+'.'+ext;
  const {error}=await sb.storage.from('enrolment-forms').upload(path, file, {contentType:file.type||'image/jpeg', upsert:true});
  if(error){
    toast('Upload failed — '+error.message);
    removeEnr();
    return;
  }
  const {data:pub}=sb.storage.from('enrolment-forms').getPublicUrl(path);
  app.enrUploaded=true;
  app.fields.enrolment_form_url = pub.publicUrl;
  app.fields.enrolment_uploaded = true;
  const kb=Math.max(1,Math.round(file.size/1024));
  $('enrWrap').innerHTML=`<div class=&quot;file-done&quot;><span class=&quot;fi&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><path d=&quot;M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z&quot;/><polyline points=&quot;14 2 14 8 20 8&quot;/></svg></span><div><b>${file.name.replace(/[<>&quot;]/g,'')}</b><small>Uploaded · ${kb} KB</small></div><button class=&quot;x&quot; onclick=&quot;removeEnr()&quot;>Remove</button></div>`;
  toast('Enrolment form uploaded');
}
function removeEnr(){app.enrUploaded=false;app.fields.enrolment_form_url='';app.fields.enrolment_uploaded=false;$('enrWrap').innerHTML=`<div class=&quot;dropzone&quot; onclick=&quot;uploadEnr()&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.6&quot;><path d=&quot;M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4&quot;/><polyline points=&quot;17 8 12 3 7 8&quot;/><line x1=&quot;12&quot; y1=&quot;3&quot; x2=&quot;12&quot; y2=&quot;15&quot;/></svg><b>Tap to upload your enrolment form</b><small>JPG only · up to 2 MB · enrolment code must be visible</small></div>`;}

  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;padding:10px 18px;background:var(--surface-2);border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:11px 18px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}tbody tr:hover{background:var(--surface-2)}
  .nm{font-weight:600;font-size:13px}
  .code{font-family:'JetBrains Mono';font-size:12px;color:var(--ink-soft);background:var(--surface-2);padding:2px 7px;border-radius:5px;border:1px solid var(--line)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px}
  .pill::before{content:&quot;&quot;;width:6px;height:6px;border-radius:50%}
  .pill.open,.pill.approved,.pill.enrolled,.pill.completed{background:var(--primary-soft);color:var(--primary)}
  .pill.open::before,.pill.approved::before,.pill.enrolled::before,.pill.completed::before{background:var(--primary)}
  .pill.closed{background:#eceeed;color:#6b7975}.pill.closed::before{background:#8a9893}
  .pill.pending{background:var(--accent-soft);color:#9a6a06}.pill.pending::before{background:var(--accent)}
  .pill.rejected,.pill.failed{background:var(--danger-soft);color:var(--danger)}.pill.rejected::before,.pill.failed::before{background:var(--danger)}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .act{font-size:11.5px;font-weight:600;color:var(--primary);padding:5px 9px;border-radius:6px;border:1px solid var(--line);background:var(--surface);transition:.12s}
  .act:hover{background:var(--primary-soft);border-color:var(--primary-soft)}
  .act.danger{color:var(--danger)}.act.danger:hover{background:var(--danger-soft);border-color:var(--danger-soft)}
  .dot-color{width:11px;height:11px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:6px}
  .cap-bar{height:6px;border-radius:4px;background:var(--line);width:90px;overflow:hidden;display:inline-block;vertical-align:middle}
  .cap-bar i{display:block;height:100%;border-radius:4px;background:var(--primary)}
  .cap-bar.full i{background:var(--danger)}

  /* forms */
  fieldset{border:1px solid var(--line);border-radius:var(--r);padding:18px;background:var(--surface-2);margin-bottom:16px}
  legend{font-family:'Space Grotesk';font-weight:600;font-size:13px;padding:0 8px;color:var(--primary)}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft)}
  .field .hint{font-size:11px;color:var(--muted);font-weight:400}
  input,select,textarea{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);width:100%;transition:.14s}
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  input[type=color]{padding:3px;height:38px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

  /* toggle switch */
  .switch-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
  .switch-row:last-child{border-bottom:none}
  .switch-row .meta{font-size:13px;font-weight:600}
  .switch-row .meta small{display:block;font-weight:400;color:var(--muted);font-size:11.5px;margin-top:1px}
  .switch{position:relative;width:42px;height:24px;flex:none}
  .switch input{opacity:0;width:0;height:0;position:absolute}
  .switch .track{position:absolute;inset:0;background:#cdd5d1;border-radius:20px;transition:.2s}
  .switch .track::before{content:&quot;&quot;;position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch input:checked+.track{background:var(--primary)}
  .switch input:checked+.track::before{transform:translateX(18px)}

  .checkbox{width:17px;height:17px;border:1.5px solid var(--muted);border-radius:5px;display:inline-grid;place-items:center;cursor:pointer;transition:.12s;flex:none;background:var(--surface)}
  .checkbox.on{background:var(--primary);border-color:var(--primary)}
  .checkbox svg{width:11px;height:11px;color:#fff;opacity:0}.checkbox.on svg{opacity:1}

  /* tabs */
  .tabs{display:flex;gap:3px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .tab{padding:11px 14px;font-size:12.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.14s}
  .tab:hover{color:var(--ink)}.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  .tab-panel{display:none}.tab-panel.active{display:block}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,24,21,.5);backdrop-filter:blur(2px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:42px 16px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:560px;box-shadow:0 24px 60px -16px rgba(0,0,0,.4);animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-family:'Space Grotesk';font-size:17px;font-weight:600}
  .modal-head p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .modal-x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:20px}
  .modal-x:hover{background:var(--surface-2);color:var(--ink)}
  .modal-body{padding:22px;max-height:64vh;overflow-y:auto}
  .modal-foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .search{position:relative;flex:1;min-width:200px}
  .toolbar .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
  .toolbar .search input{padding-left:34px}
  .toolbar select{width:auto;min-width:140px}
  .section-title{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin:4px 0 14px}
  .empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty svg{width:34px;height:34px;opacity:.4;margin-bottom:8px}

  /* bulk bar */
  .bulkbar{display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;border-radius:var(--r);padding:10px 16px;margin-bottom:14px;flex-wrap:wrap;animation:fade .2s}
  .bulkbar .cnt{font-weight:600;font-size:13px;margin-right:4px}
  .bulkbar select{width:auto;background:var(--sb-soft);color:#fff;border-color:#33453e;min-width:130px}
  .bulkbar .btn-sm{background:rgba(255,255,255,.14);color:#fff}
  .bulkbar .btn-sm:hover{background:rgba(255,255,255,.24)}

  /* upload zone */
  .dropzone{border:2px dashed var(--line);border-radius:var(--r);padding:32px;text-align:center;background:var(--surface-2);transition:.14s;cursor:pointer}
  .dropzone:hover{border-color:var(--primary);background:var(--primary-soft)}
  .dropzone svg{width:32px;height:32px;color:var(--muted);margin-bottom:8px}
  .dropzone b{display:block;font-size:13px;margin-bottom:3px}
  .dropzone small{color:var(--muted);font-size:11.5px}

  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .chart-box{height:250px;padding:10px 14px 14px;position:relative}
  .credit-box{background:var(--primary);color:#fff;border-radius:var(--r);padding:18px}
  .credit-box .big{font-family:'Space Grotesk';font-size:30px;font-weight:600}
  .credit-box small{opacity:.85;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .composer{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start}
  .char-count{font-size:11.5px;color:var(--muted);margin-top:6px;text-align:right}

  .doc-line{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
  .doc-line .num{width:24px;height:24px;border-radius:6px;background:var(--primary-soft);color:var(--primary);font-family:'JetBrains Mono';font-size:12px;font-weight:600;display:grid;place-items:center;flex:none;margin-top:7px}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);z-index:90;transform:translateY(80px);opacity:0;transition:.3s}
  .toast.show{transform:none;opacity:1}.toast svg{width:17px;height:17px;color:var(--accent)}

  .backdrop{display:none}
  @media(max-width:1100px){.stat-grid{grid-template-columns:repeat(3,1fr)}.chart-grid{grid-template-columns:1fr}}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;width:264px;transform:translateX(-100%);transition:transform .25s}
    .sidebar.open{transform:none}
    .backdrop.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
    .hamburger{display:flex}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .content{padding:18px 16px 40px}.topbar{padding:12px 16px}
    .composer{grid-template-columns:1fr}.grid-2,.grid-3{grid-template-columns:1fr}
  }
  /* ===== Registered Students (View Students) ===== */
  .reg-dl{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .btn-grn{display:inline-flex;align-items:center;gap:8px;background:#2f9e54;color:#fff;font-weight:600;font-size:13px;padding:11px 15px;border-radius:8px;transition:.14s}
  .btn-grn:hover{background:#28894a}
  .btn-grn svg{width:16px;height:16px}
  .dt-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .dt-actions{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;position:relative}
  .dt-actions>button{padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--surface-2);border-right:1px solid var(--line)}
  .dt-actions>button:hover{background:#eef2f0;color:var(--ink)}
  .dt-colvis{position:relative}
  .dt-colvis>button{border-right:none}
  .colvis-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:6px;z-index:20;display:none;min-width:190px}
  .colvis-menu.show{display:block}
  .colvis-menu label{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer}
  .colvis-menu label:hover{background:var(--surface-2)}
  .colvis-menu input{width:auto;margin:0}
  .dt-search{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft)}
  .dt-search input{width:220px}
  #regTable thead th{cursor:pointer;user-select:none;white-space:nowrap}
  #regTable thead th.exp-col{cursor:default;width:44px}
  #regTable thead th .sortic{color:var(--muted);font-size:11px;margin-left:3px}
  #regTable thead th.sorted-asc .sortic::after{content:'↑';color:var(--primary)}
  #regTable thead th.sorted-desc .sortic::after{content:'↓';color:var(--primary)}
  #regTable thead th.sorted-asc .sortic,#regTable thead th.sorted-desc .sortic{font-size:0}
  .exp-btn{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:15px;font-weight:600;line-height:1;transition:.14s}
  .exp-btn:hover{background:var(--primary-deep)}
  .exp-btn.open{background:var(--danger)}
  .reg-detail td{background:var(--surface-2);padding:0}
  .reg-detail-in{padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 22px}
  .reg-detail-in .kv{font-size:12.5px}
  .reg-detail-in .kv b{display:block;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .enrol-thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;border:1px solid var(--line)}
  .enrol-none{width:34px;height:42px;border-radius:5px;background:#2b3a35;color:#cdd5d1;display:grid;place-items:center;font-weight:700;font-size:14px}
  .dt-foot{padding:11px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
  @media(max-width:820px){.dt-search input{width:150px}}
  /* ===== Detailed Enrolment Reports ===== */
  .rep-modal{max-width:880px}
  .rep-tabs{display:flex;flex-wrap:wrap;gap:4px;background:#1f6feb;padding:10px 12px 0}
  .rep-tab{padding:9px 13px;font-size:12.5px;font-weight:600;color:#dbe7ff;border-radius:7px 7px 0 0;white-space:nowrap;transition:.12s}
  .rep-tab:hover{background:rgba(255,255,255,.16);color:#fff}
  .rep-tab.active{background:#fff;color:#14201c}
  .rep-title{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin-bottom:6px}
  .rep-lbl{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:16px 0 6px}
  .rep-dates{display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
  .rep-dates input{width:auto}
  .rep-radios{display:flex;gap:22px;margin:18px 0 0}
  .rep-radio{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13.5px;cursor:pointer}
  .rep-radio input{width:auto}
  .rep-note{font-size:13px;color:var(--muted);margin:6px 0 0}
  .rep-actions{display:flex;gap:10px;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--line);flex-wrap:wrap}
  .env-badge{position:fixed;top:8px;right:10px;z-index:99999;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;padding:4px 9px;border-radius:20px;background:#0C4537;color:#7FE3C2;border:1px solid #1E4F40;box-shadow:0 4px 14px -6px rgba(0,0,0,.5);pointer-events:none}
  .env-badge.dev{background:#5b3a08;color:#FBD37A;border-color:#7a5409}
  .sms-preview{margin-top:10px;font-size:12.5px;font-weight:600;color:var(--primary);background:var(--primary-soft);border:1px solid #cfe6dd;border-radius:var(--r-sm);padding:9px 12px}
  .sms-preview.empty{color:var(--accent-ink);background:var(--accent-soft);border-color:#f0dcae}
  .sms-vars{margin-top:8px;font-size:11.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .sms-vars button{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--primary);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:3px 7px;transition:.12s}
  .sms-vars button:hover{background:var(--primary-soft);border-color:var(--primary)}
  .tpl-toolbar{display:flex;flex-wrap:wrap;gap:3px;align-items:center;padding:8px 10px;background:var(--surface-2);border-bottom:1px solid var(--line)}
  .tpl-toolbar button{min-width:30px;height:30px;padding:0 7px;font-size:13px;border:1px solid transparent;background:transparent;border-radius:6px;color:var(--ink-soft);cursor:pointer}
  .tpl-toolbar button:hover{background:#fff;border-color:var(--line);color:var(--primary)}
  .tpl-toolbar select{height:30px;border:1px solid var(--line);background:#fff;border-radius:6px;font-size:12px;color:var(--ink-soft);padding:0 4px;cursor:pointer}
  .tpl-toolbar .tb-sep{width:1px;height:20px;background:var(--line);margin:0 4px}
  .tpl-toolbar .tb-color{position:relative;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;color:var(--ink-soft)}
  .tpl-toolbar .tb-color:hover{background:#fff}
  .tpl-toolbar .tb-color input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .tpl-page{background:#e9eef0;padding:26px;max-height:none;min-height:62vh;overflow:auto;display:flex;justify-content:center}
  .tpl-fieldbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fbfaf6;border-bottom:1px solid var(--line);overflow-x:auto}
  .tpl-fieldbar .fb-label{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
  .tpl-fieldbar .tpl-vars{flex-wrap:nowrap}
  .tpl-hint{font-size:11.5px;color:var(--muted);margin:10px 2px 0}
  #tplCard.tpl-fs{position:fixed;inset:0;z-index:300;border-radius:0;display:flex;flex-direction:column;margin:0}
  #tplCard.tpl-fs .tpl-page{flex:1;min-height:0}
  #tplCard.tpl-fs .tpl-editor{min-height:100%}
  .tpl-editor{position:relative;width:100%;max-width:794px;min-height:560px;background:#fff;box-shadow:0 2px 14px -4px rgba(0,0,0,.25);border-radius:2px;padding:48px 56px;font-family:Georgia,serif;font-size:14px;line-height:1.6;color:#14201c}
  .tpl-editor:focus{outline:none}
  .tpl-editor h2{font-size:17px;border-bottom:2px solid var(--primary);padding-bottom:4px}
  .tpl-editor img{max-width:100%}
  .tpl-editor table{width:100%;border-collapse:collapse;margin:10px 0}
  .tpl-editor td{padding:6px 4px;border-bottom:1px solid #eee}
  .tpl-vars{display:flex;flex-wrap:wrap;gap:6px}
  .tpl-vars button{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--primary);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;cursor:pointer}
  .tpl-vars button:hover{background:var(--primary-soft);border-color:var(--primary)}
  .seg-btn{border:0;background:transparent;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}
  .seg-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:4px}
  .perm-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);padding:5px 0;cursor:pointer}
  .perm-row input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
  @media(max-width:560px){.perm-grid{grid-template-columns:1fr}}
  /* Read-only mode: hide all write controls, keep navigation, export, print, preview, cancel */
  body.ro .btn-primary{display:none!important}
  body.ro .act:not(.danger):not(.ghost-safe){display:none!important}
  body.ro .act.danger{display:none!important}
  body.ro .row-actions{display:none!important}
  body.ro .bulkbar,body.ro .bulk-bar,body.ro .bulk-actions{display:none!important}
  body.ro .checkcol,body.ro .row-check,body.ro input[type=checkbox].rowsel{display:none!important}
  body.ro .modal-foot .btn-primary{display:none!important}
  /* ===== DISCLAIMER ===== */
  .disc-overlay{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(12,30,24,.55);backdrop-filter:blur(3px)}
  .disc-overlay.show{display:flex}
  .disc-modal{background:var(--surface,#fff);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;border-radius:16px;box-shadow:0 24px 60px -12px rgba(0,0,0,.4);overflow:hidden}
  .disc-head{display:flex;align-items:center;gap:12px;padding:20px 22px 14px;border-bottom:1px solid var(--line,#e7ece9)}
  .disc-head h2{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin:0;color:var(--ink,#14201c)}
  .disc-ico{flex:none;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:#fff4e0;color:#c87a08}
  .disc-ico svg{width:21px;height:21px}
  .disc-body{padding:16px 22px;overflow-y:auto;font-size:13.5px;line-height:1.6;color:var(--ink-soft,#39504a)}
  .disc-body p{margin:0 0 12px}
  .disc-body ul{margin:0 0 12px;padding-left:18px}
  .disc-body li{margin-bottom:9px}
  .disc-foot{padding:14px 22px 18px;border-top:1px solid var(--line,#e7ece9);background:var(--surface-2,#f6f9f7)}
  .disc-check{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--ink,#14201c);margin-bottom:14px;cursor:pointer}
  .disc-check input{width:17px;height:17px;flex:none;accent-color:var(--primary,#115E4A);cursor:pointer}
  .disc-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .disc-actions .btn:disabled{opacity:.5;cursor:not-allowed}
  @media(max-width:520px){.disc-actions{flex-direction:column-reverse}.disc-actions .btn{width:100%;justify-content:center}}
</style>
</head>
<body>
<div class=&quot;env-badge&quot; id=&quot;envBadge&quot;>● PRODUCTION</div>
<div class=&quot;app&quot;>

<div class=&quot;toast&quot; id=&quot;toast&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><path d=&quot;M22 11.08V12a10 10 0 1 1-5.93-9.14&quot;/><polyline points=&quot;22 4 12 14.01 9 11.01&quot;/></svg><span id=&quot;toastMsg&quot;></span></div>

<script>
/* ===== DATA ===== */
let admissionOpen=true;
let smsBalance=500;
let programmes=[
  {id:1,code:'SCI',name:'General Science',subjects:'English, Maths, Physics, Chemistry, Biology',cap:120,enr:95},
  {id:2,code:'ART',name:'General Arts',subjects:'English, Maths, Literature, History, CRS, Economics',cap:150,enr:112},
  {id:3,code:'BUS',name:'Business',subjects:'English, Maths, Accounting, Business Mgmt, Economics',cap:100,enr:78},
  {id:4,code:'VOC',name:'Visual Arts',subjects:'English, Maths, Graphic Design, Sculpture, Textiles',cap:80,enr:41},
];
let houses=[
  {id:1,name:'Lumumba',color:'#B23A3A',motto:'Unity and Strength',cap:100,occ:67},
  {id:2,name:'Nkrumah',color:'#D2941A',motto:'Freedom and Justice',cap:100,occ:72},
  {id:3,name:'Mandela',color:'#2E7D4F',motto:'Peace and Reconciliation',cap:100,occ:54},
  {id:4,name:'Tubman',color:'#3066A3',motto:'Courage and Perseverance',cap:100,occ:48},
];
let classes=[
  {id:1,name:'Form 1A',code:'1A',cap:50,occ:48},
  {id:2,name:'Form 1B',code:'1B',cap:50,occ:45},
  {id:3,name:'Form 1C',code:'1C',cap:50,occ:50},
  {id:4,name:'Form 1D',code:'1D',cap:50,occ:38},
];
let docLines=[
  'Printed copy of admission letter, personal record form and acceptance form.',
  'Fully filled placement forms.',
  'A copy of your BECE results slip.',
  'Photocopy of birth certificate / baptismal certificate.',
  'All documents must be submitted during reporting, filled, and put in a flat file.',
];
const fn=['Kofi','Ama','Yaw','Akua','Kwame','Esi','Kojo','Adwoa','Kwabena','Abena','Fiifi','Efua','Nana','Yaa'];
const ln=['Mensah','Owusu','Asante','Boateng','Addo','Sarpong','Agyei','Darko','Appiah','Ofori'];
const stArr=['pending','approved','enrolled','rejected'];
let students=[],placement=[];
(function seed(){
  let idx=100000000026;
  for(let i=0;i<46;i++){
    const p=programmes[Math.floor(Math.random()*programmes.length)];
    const gender=Math.random()<.52?'M':'F';
    const name=fn[Math.floor(Math.random()*fn.length)]+' '+ln[Math.floor(Math.random()*ln.length)];
    const stt=stArr[Math.floor(Math.random()*4)];
    const index=(idx+=1+Math.floor(Math.random()*9))+'';
    students.push({id:i+1,index,name,gender,progId:p.id,
      classId:stt==='pending'?null:classes[Math.floor(Math.random()*4)].id,
      houseId:stt==='pending'?null:houses[Math.floor(Math.random()*4)].id,
      status:stt,adm:stt==='pending'?'—':p.code+'/2025/'+String(i+1).padStart(3,'0'),
      reg:randDate()});
    placement.push({index,name,prog:p.name,code:'ENR'+(10000+i),loggedIn:Math.random()<.6});
  }
})();
function randDate(){const d=new Date();d.setDate(d.getDate()-Math.floor(Math.random()*26));return d.toISOString().slice(0,10);}
let payments=[];
(function(){const m=['Paystack','Hubtel','Flutterwave','Bank'];const s=['completed','completed','completed','pending','failed'];
  students.slice(0,30).forEach((st,i)=>payments.push({date:randDate(),name:st.name,index:st.index,amount:30,method:m[i%4],status:s[i%5],txn:'TXN'+(100000+i*37)}));})();
let smsHistory=[
  {date:'2026-06-08',group:'Approved',recip:18,msg:'Your admission is approved. Report on 18 Oct 2025.',status:'sent'},
  {date:'2026-06-06',group:'All',recip:46,msg:'Complete your application before 15 June.',status:'sent'},
];
let activityLog=[
  {time:'Today 09:14',action:'Approved 6 students',by:'Isaac Addo'},
  {time:'Today 08:52',action:'Imported 46 placement records',by:'Isaac Addo'},
  {time:'Yesterday 16:30',action:'Updated service charge to GHS 30',by:'Isaac Addo'},
  {time:'Yesterday 14:05',action:'Sent reporting reminder to 12 students',by:'Isaac Addo'},
];
let selected=new Set();

/* ===== HELPERS ===== */
const $=id=>document.getElementById(id);
const progById=id=>programmes.find(p=>p.id===id)||{code:'—',name:'—'};
const houseById=id=>houses.find(h=>h.id===id);
const classById=id=>classes.find(c=>c.id===id);
const fmt=n=>n.toLocaleString('en-US');
const money=n=>'GHS '+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){$('toastMsg').textContent=m;const t=$('toast');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
const pendingCount=()=>students.filter(s=>s.status==='pending').length;
const totalRevenue=()=>payments.filter(p=>p.status==='completed').reduce((a,p)=>a+p.amount,0);

/* ===== ADMISSION TOGGLE ===== */
function toggleAdmission(){
  admissionOpen=!admissionOpen;
  const b=$('admBadge');b.className='adm-badge '+(admissionOpen?'open':'closed');
  $('admText').textContent='Admission '+(admissionOpen?'OPEN':'CLOSED');
  $('qaToggle').innerHTML=(admissionOpen?'Close admission':'Open admission')+'<small>'+(admissionOpen?'Currently accepting':'Not accepting')+'</small>';
  activityLog.unshift({time:'Just now',action:'Admission '+(admissionOpen?'opened':'closed'),by:(SB_ADMIN_NAME||'Admin')});
  toast('Admission '+(admissionOpen?'opened':'closed'));
}

/* ===== DASHBOARD ===== */
function renderStats(){
  const total=students.length;
  const today=new Date().toISOString().slice(0,10);
  const todayReg=students.filter(s=>(s.reg||'')===today).length;
  const cards=[
    {lbl:'Total Students',val:total,ico:'users',d:'enrolled'},
    {lbl:&quot;Today's Reg.&quot;,val:todayReg,ico:'bolt',d:'live'},
    {lbl:'Programmes',val:programmes.length,ico:'check',d:'offered'},
    {lbl:'Placement',val:(typeof placement!=='undefined'?placement.length:0),ico:'clock',d:'CSSPS records'},
    {lbl:'SMS Credits',val:fmt(smsBalance),ico:'sms',d:'remaining'},
    {lbl:'Revenue',val:totalRevenue(),cur:true,ico:'cash',d:'collected'},
  ];
  const ic={users:'<path d=&quot;M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2&quot;/><circle cx=&quot;9&quot; cy=&quot;7&quot; r=&quot;4&quot;/>',bolt:'<polygon points=&quot;13 2 3 14 12 14 11 22 21 10 12 10 13 2&quot;/>',check:'<path d=&quot;M22 10v6M2 10l10-5 10 5-10 5z&quot;/><path d=&quot;M6 12v5c3 3 9 3 12 0v-5&quot;/>',clock:'<path d=&quot;M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z&quot;/><polyline points=&quot;14 2 14 8 20 8&quot;/>',sms:'<path d=&quot;M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z&quot;/>',cash:'<line x1=&quot;12&quot; y1=&quot;1&quot; x2=&quot;12&quot; y2=&quot;23&quot;/><path d=&quot;M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6&quot;/>'};
  $('statGrid').innerHTML=cards.map(c=>`<div class=&quot;stat&quot; ${c.d==='live'?'data-live=&quot;1&quot;':''}><div class=&quot;top&quot;><span class=&quot;lbl&quot;>${c.lbl}</span><span class=&quot;ico&quot;><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;>${ic[c.ico]}</svg></span></div><div class=&quot;val&quot;>${c.cur?'<span class=&quot;cur&quot;>GHS</span>'+fmt(c.val):c.val}</div><div class=&quot;delta&quot;>${c.d==='live'?'updating live':c.d}</div></div>`).join('');
  var bp=$('badge-pending'); if(bp) bp.textContent=total;
}
function renderRecent(){
  const rows=[...students].sort((a,b)=>b.reg.localeCompare(a.reg)).slice(0,8);
  $('recentRows').innerHTML=rows.map(s=>`<tr><td class=&quot;mono&quot;>${s.reg}</td><td class=&quot;mono&quot;>${s.index}</td><td class=&quot;nm&quot;>${s.name}</td><td>${progById(s.progId).name}</td><td><div class=&quot;row-actions&quot;><button class=&quot;act&quot; onclick=&quot;viewStudent(${s.id})&quot;>View</button></div></td></tr>`).join('');
}

/* ===== PROGRAMMES / HOUSES / CLASSES ===== */
function renderProg(){
  $('progRows').innerHTML=programmes.map(p=>{const pct=Math.round(p.enr/p.cap*100);return `<tr><td><span class=&quot;code&quot;>${p.code}</span></td><td class=&quot;nm&quot;>${p.name}</td><td style=&quot;max-width:260px;color:var(--ink-soft);font-size:12.5px&quot;>${p.subjects}</td><td class=&quot;mono&quot;>${p.cap}</td><td><div class=&quot;cap-bar ${pct>=100?'full':''}&quot;><i style=&quot;width:${Math.min(pct,100)}%&quot;></i></div> <span class=&quot;mono&quot; style=&quot;font-size:12px&quot;>${p.enr}</span></td><td><div class=&quot;row-actions&quot;><button class=&quot;act&quot; onclick=&quot;openProg(${p.id})&quot;>Edit</button><button class=&quot;act danger&quot; onclick=&quot;delItem('prog',${p.id})&quot;>Delete</button></div></td></tr>`;}).join('');
}
function renderHouses(){
  $('houseRows').innerHTML=houses.map(h=>{const pct=Math.round(h.occ/h.cap*100);const cat=[h.rtype,h.gender].filter(Boolean).join(' · ')||'Any';return `<tr><td class=&quot;nm&quot;><span class=&quot;dot-color&quot; style=&quot;background:${h.color}&quot;></span>${h.name}</td><td><span class=&quot;pill ${h.rtype==='Boarding'?'open':(h.rtype==='Day'?'closed':'')}&quot;>${cat}</span></td><td style=&quot;color:var(--ink-soft)&quot;>${h.motto||'—'}</td><td class=&quot;mono&quot;>${h.cap}</td><td><div class=&quot;cap-bar ${pct>=100?'full':''}&quot;><i style=&quot;width:${Math.min(pct,100)}%&quot;></i></div> <span class=&quot;mono&quot; style=&quot;font-size:12px&quot;>${h.occ}</span></td><td><div class=&quot;row-actions&quot;><button class=&quot;act&quot; onclick=&quot;openHouse(${h.id})&quot;>Edit</button><button class=&quot;act danger&quot; onclick=&quot;delItem('house',${h.id})&quot;>Delete</button></div></td></tr>`;}).join('');
}
function renderClasses(){
  $('classRows').innerHTML=classes.map(c=>{const pct=Math.round(c.occ/c.cap*100);const pr=c.progId?(programmes.find(p=>p.id===c.progId)||{}).name:'';return `<tr><td class=&quot;nm&quot;>${c.name}</td><td>${pr?`<span class=&quot;pill open&quot;>${pr}</span>`:'<span style=&quot;color:var(--muted)&quot;>—</span>'}</td><td><span class=&quot;code&quot;>${c.code||'—'}</span></td><td class=&quot;mono&quot;>${c.cap}</td><td><div class=&quot;cap-bar ${pct>=100?'full':''}&quot;><i style=&quot;width:${Math.min(pct,100)}%&quot;></i></div> <span class=&quot;mono&quot; style=&quot;font-size:12px&quot;>${c.occ}</span></td><td><div class=&quot;row-actions&quot;><button class=&quot;act&quot; onclick=&quot;openClass(${c.id})&quot;>Edit</button><button class=&quot;act danger&quot; onclick=&quot;delItem('class',${c.id})&quot;>Delete</button></div></td></tr>`;}).join('');
}
function delItem(type,id){
  const map={prog:[programmes,'programme'],house:[houses,'house'],class:[classes,'class']};
  const [arr,label]=map[type];const item=arr.find(x=>x.id===id);
  if(!confirm('Delete '+(item.name||item.code)+'?'))return;
  const i=arr.indexOf(item);arr.splice(i,1);
  if(type==='prog')renderProg();if(type==='house')renderHouses();if(type==='class')renderClasses();
  fillSelects();toast(label.charAt(0).toUpperCase()+label.slice(1)+' deleted');
}

/* generic CRUD modal */
function crudModal(title,fields,onSave){
  const m=$('modal');
  m.innerHTML=`<div class=&quot;modal-head&quot;><h2>${title}</h2><button class=&quot;modal-x&quot; onclick=&quot;closeModal()&quot;>×</button></div>
  <div class=&quot;modal-body&quot;>${fields}</div>
  <div class=&quot;modal-foot&quot;><button class=&quot;btn btn-ghost&quot; onclick=&quot;closeModal()&quot;>Cancel</button><button class=&quot;btn btn-primary&quot; id=&quot;crudSave&quot;>Save</button></div>`;
  $('overlay').classList.add('show');$('crudSave').onclick=onSave;
}
function openProg(id){
  const p=id?programmes.find(x=>x.id===id):{code:'',name:'',subjects:'',cap:100};
  crudModal(id?'Edit programme':'Add programme',

async function deletePlacementBatch(scope){

async function handlePlacementFile(inp){
  const file=inp.files[0];inp.value='';
  if(!file)return;
  if(!SB_SCHOOL){toast('School not loaded yet');return;}
  const text=await file.text();
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){toast('CSV file appears empty');return;}
  const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  const rows=lines.slice(1).map(line=>{
    const cols=line.split(',').map(c=>c.trim().replace(/^&quot;|&quot;$/g,''));
    const obj={};
    hdrs.forEach((h,i)=>{if(cols[i]!==undefined&amp;&amp;cols[i]!=='')obj[h]=cols[i];});
    return obj;
  }).filter(r=>r.index_number);
  if(!rows.length){toast('No valid rows found in CSV');return;}
  toast('Importing '+rows.length+' rows…');
  const {data,error}=await sb.rpc('import_placement',{p_school:SB_SCHOOL.id,p_rows:rows});
  if(error){toast('Import failed: '+error.message);return;}
  const res=data||{};
  toast('Done — inserted: '+(res.inserted||0)+', updated: '+(res.updated||0)+', skipped: '+(res.skipped_submitted||0));
  const {data:plcData}=await sb.from('placement_list').select('*');
  placement=(plcData||[]).map(p=>({index:p.index_number,name:p.student_name,other:p.other_names||'',gender:p.gender||'',res:p.residential_status||'',prog:p.programme,agg:p.aggregate,jhs:p.jhs_attended||'',dob:p.dob||'',sms:p.sms_contact||'',code:p.enrolment_code,loggedIn:p.logged_in}));
  renderPlacement();
}

let haSel=new Set(), caSel=new Set();
function genderLabel(g){return g==='M'?'Male':g==='F'?'Female':(g||'—');}
function houseMatchesGender(h,s){ if(!h||!h.gender) return true; const hg=String(h.gender).toLowerCase(); const sg=(s.gender==='M'?'male':s.gender==='F'?'female':''); return !sg||hg===sg; }
function fillSelKeep(sel,html){ if(!sel)return; const cur=sel.value; sel.innerHTML=html; if(cur&amp;&amp;[...sel.options].some(o=>o.value===cur)) sel.value=cur; }

function renderHouseAlloc(){
  const sel=$('haHouse'); if(!sel)return;
  fillSelKeep(sel, houses.length?houses.map(h=>`<option value=&quot;${h.id}&quot;>${h.name}${h.gender?' · '+h.gender:''}${h.rtype?' · '+h.rtype:''}</option>`).join(''):'<option value=&quot;&quot;>No houses</option>');
  const hid=+sel.value||0, h=houseById(hid), gf=val('haGender');
  const members=students.filter(s=>s.houseId===hid);
  const pool=students.filter(s=>!s.houseId &amp;&amp; (!gf||s.gender===gf) &amp;&amp; houseMatchesGender(h,s));
  $('haCount').textContent=members.length;

function validPhone(p){ return /\d{9,}/.test(((p||'')+'').replace(/\D/g,'')); }
function smsTargets(){
  var g=($('smsGroup')&amp;&amp;$('smsGroup').value)||'all';
  var list=students.slice();
  if(g==='submitted') list=list.filter(s=>s.submitted);
  else if(g==='pending') list=list.filter(s=>!s.submitted);
  else if(g==='paid') list=list.filter(s=>s.pay==='paid');
  else if(g==='unpaid') list=list.filter(s=>s.pay!=='paid');
  else if(g==='boarding') list=list.filter(s=>(s.res||'').toLowerCase().indexOf('board')>-1);
  else if(g==='day') list=list.filter(s=>(s.res||'').toLowerCase().indexOf('day')>-1);
  else if(g==='notloggedin') list=list.filter(s=>!s.loggedIn);
  else if(g.indexOf('prog:')===0) list=list.filter(s=>String(s.progId)===g.slice(5));
  else if(g.indexOf('class:')===0) list=list.filter(s=>String(s.classId)===g.slice(6));
  else if(g.indexOf('house:')===0) list=list.filter(s=>String(s.houseId)===g.slice(6));
  return list.filter(s=>validPhone(s.sms));
}
function smsParts(t){return Math.max(1,Math.ceil((t||'').length/160));}
function personalize(tpl,s){
  return (tpl||'')
    .replace(/\{NAME\}/g, s.name||'')
    .replace(/\{INDEX\}/g, s.index||'')
    .replace(/\{SCHOOL\}/g, (SB_SCHOOL&amp;&amp;SB_SCHOOL.name)|| (typeof SCHOOL_NAME!=='undefined'?SCHOOL_NAME:'') || 'the school')
    .replace(/\{PROGRAMME\}/g, (progById(s.progId)||{}).name||'')
    .replace(/\{REPORTING\}/g, (typeof REPORTING_DATE!=='undefined'&amp;&amp;REPORTING_DATE)||'the reporting date');
}
function insVar(v){var t=$('smsBody');var st=t.selectionStart||t.value.length;t.value=t.value.slice(0,st)+v+t.value.slice(t.selectionEnd||st);updateSms();t.focus();}
function loadTpl(v){
  const t={
    reminder:'Hello {NAME}, this is {SCHOOL}. Reporting day is {REPORTING}. Please bring all required documents. Thank you.',
    payment:'Hi {NAME}, your {SCHOOL} admission login uses index {INDEX}. Keep your token safe. Log in at the admission portal.',
    docs:'Dear {NAME}, please complete your Personal Records Form and download your admission documents on the {SCHOOL} portal before {REPORTING}.',
    welcome:'Congratulations {NAME}! You have been admitted to {SCHOOL} ({PROGRAMME}). Log in to complete your enrolment.'
  };
  if(t[v]){$('smsBody').value=t[v];updateSms();}
}
function updateSms(){
  var body=($('smsBody').value||''); var parts=smsParts(body);
  var targets=smsTargets(); var n=targets.length; var cost=parts*n;
  $('smsChars').textContent=body.length;
  $('smsCred').textContent=parts;
  if($('smsCost'))$('smsCost').textContent=cost;
  $('smsRecip').textContent=n;
  $('smsBalance').textContent=fmt(smsBalance);
  var pv=$('smsPreview');
  if(pv){ var skipped=smsTargets.skipped||0;
    pv.textContent=n? (n+' recipient'+(n===1?'':'s')+' with a valid phone number') : 'No recipients with a valid phone number in this group';
    pv.className='sms-preview'+(n?'':' empty'); }
}

  const ap=document.getElementById('admParent'); if(ap) ap.style.display=can('students')?'':'none';
  buildNavSelect();
  // Granted privileges are READ-ONLY for staff. Only the owner (NULL permissions) can write.
  READONLY=!isOwner();
  if(READONLY){
    document.body.classList.add('ro');
    const ab=$('admBadge'); if(ab){ab.style.pointerEvents='none';ab.style.cursor='default';}
    const qt=$('qaToggle'); if(qt&amp;&amp;qt.closest('button')) qt.closest('button').style.display='none';

}
