async function adminLogin(){
  const btn=document.getElementById('ag_btn'), err=document.getElementById('ag_err');
  btn.textContent='Signing in…'; err.style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email:val('ag_email').trim(),password:val('ag_pass')});
  if(error){ err.textContent=error.message; err.style.display='block'; btn.textContent='Sign in'; return; }
  const {data:prof}=await sb.from('profiles').select('full_name,role,school_id,permissions').eq('id',data.user.id).single();
  if(!prof||(prof.role!=='school_admin'&amp;&amp;prof.role!=='super_admin')){ err.textContent='This account has no school-admin access.'; err.style.display='block'; btn.textContent='Sign in'; await sb.auth.signOut(); return; }
  SB_UID=data.user.id; SB_PERMS=(prof.permissions===undefined?null:prof.permissions); SB_HOUSE=(SB_PERMS&amp;&amp;SB_PERMS.house)||null;
  try{ await loadSchoolData(prof); }
  catch(e){ err.textContent='Could not load school data.'; err.style.display='block'; btn.textContent='Sign in'; return; }
  document.getElementById('authGate').remove();
  document.querySelector('.app').style.display='';
  applyPermissions();
  go(firstAllowedView());
  showDisclaimer();
}

async function loadSchoolData(prof){
  // Resolve THIS admin's school so we never read another school's data
  let myId=(prof&amp;&amp;prof.school_id)||null;
  if(!myId){ const {data:sd}=await sb.from('schools').select('id').limit(1); myId=(sd&amp;&amp;sd[0]&amp;&amp;sd[0].id)||null; }
  const [sch,cfg,progs,hs,cls,stu,plc,pay,sms,log]=await Promise.all([
    sb.from('schools').select('*').eq('id',myId),
    sb.from('school_config').select('*').eq('school_id',myId),
    sb.from('programmes').select('*').eq('school_id',myId).order('code'),
    sb.from('houses').select('*').eq('school_id',myId).order('name'),
    sb.from('classrooms').select('*').eq('school_id',myId).order('name'),
    sb.from('students').select('*').eq('school_id',myId).order('created_at',{ascending:false}),
    sb.from('placement_list').select('*').eq('school_id',myId),
    sb.from('payments').select('*, students(bece_index, full_name)').eq('school_id',myId).order('created_at',{ascending:false}),
    sb.from('sms_log').select('*').eq('school_id',myId).order('sent_at',{ascending:false}),
    sb.from('activity_log').select('*').eq('school_id',myId).order('created_at',{ascending:false}),
  ]);
  SB_SCHOOL=(sch.data||[])[0]; SB_CFG=(cfg.data||[])[0]||{};
  if(SB_SCHOOL){ const nm=$('brandName'); if(nm) nm.textContent=SB_SCHOOL.name||'School Name'; }
  if(SB_SCHOOL&amp;&amp;SB_SCHOOL.crest_url){ SCHOOL_CREST=SB_SCHOOL.crest_url; const bm=$('brandCrest'); if(bm){bm.src=SCHOOL_CREST;bm.style.display='block';} const lt=$('brandLogoText'); if(lt) lt.style.display='none'; const pv=$('s_crest_prev'); if(pv){pv.src=SCHOOL_CREST;pv.style.display='block';} }
  else { const bm=$('brandCrest'); if(bm){bm.removeAttribute('src');bm.style.display='none';} const lt=$('brandLogoText'); if(lt) lt.style.display=''; }
  // House-scoped user: only see that house and its students
  if(SB_HOUSE){ stu.data=(stu.data||[]).filter(s=>s.house_id===SB_HOUSE); hs.data=(hs.data||[]).filter(h=>h.id===SB_HOUSE); }

  const pRev={},hRev={},cRev={}; pMap={};hMap={};cMap={};
  programmes=(progs.data||[]).map((p,i)=>{const id=i+1;pMap[id]=p.id;pRev[p.id]=id;return {id,_id:p.id,code:p.code,name:p.name,subjects:p.subjects||'',cap:p.capacity,enr:(stu.data||[]).filter(s=>s.programme_id===p.id).length};});
  houses=(hs.data||[]).map((h,i)=>{const id=i+1;hMap[id]=h.id;hRev[h.id]=id;return {id,_id:h.id,name:h.name,color:h.color,motto:h.motto,cap:h.capacity,gender:h.gender||'',rtype:h.residential_type||'',occ:(stu.data||[]).filter(s=>s.house_id===h.id).length};});
  classes=(cls.data||[]).map((c,i)=>{const id=i+1;cMap[id]=c.id;cRev[c.id]=id;return {id,_id:c.id,name:c.name,code:c.code,cap:c.capacity,progId:c.programme_id?pRev[c.programme_id]:'',occ:(stu.data||[]).filter(s=>s.class_id===c.id).length};});
  const plcByIdx={}; (plc.data||[]).forEach(p=>plcByIdx[p.index_number]=p);
  students=(stu.data||[]).map((s,i)=>{ const pl=plcByIdx[s.bece_index]||{}; const dt=s.created_at?new Date(s.created_at):null;
    return {id:i+1,_id:s.id,index:s.bece_index,name:s.full_name||'(no name)',gender:s.gender||'M',
      progId:pRev[s.programme_id]||null,classId:cRev[s.class_id]||null,houseId:hRev[s.house_id]||null,
      status:s.status,adm:s.admission_no||'—',reg:(s.created_at||'').slice(0,10),
      time: dt?dt.toTimeString().slice(0,8):'—',
      sms: s.parent_phone||pl.sms_contact||'—',
      enrol: pl.enrolment_code||'—',
      form: s.enrolment_form_url||null,
      other: pl.other_names||'', dob: pl.dob||'', parent: s.parent_name||'—',
      res: pl.residential_status||'—', rec: s.records||{},
      pay: s.payment_status||'unpaid', submitted: !!s.submitted_at, loggedIn: !!pl.logged_in};
  });
  placement=(plc.data||[]).map(p=>({index:p.index_number,name:p.student_name,other:p.other_names||'',gender:p.gender||'',res:p.residential_status||'',prog:p.programme,agg:p.aggregate,jhs:p.jhs_attended||'',dob:p.dob||'',sms:p.sms_contact||'',code:p.enrolment_code,loggedIn:p.logged_in}));
  payments=(pay.data||[]).map(p=>({date:(p.paid_at||p.created_at||'').slice(0,10),name:(p.students&amp;&amp;p.students.full_name)||p.payer_name||'—',index:(p.students&amp;&amp;p.students.bece_index)||'—',amount:(p.amount_pesewas||0)/100,method:p.channel,status:p.status,txn:p.reference}));
  smsHistory=(sms.data||[]).map(s=>({date:(s.sent_at||'').slice(0,10),group:s.recipient_group,recip:s.recipients,msg:s.message,status:s.status}));
  activityLog=(log.data||[]).map(l=>({time:fmtT(l.created_at),action:l.action,by:l.actor||'—'}));

  admissionOpen=(SB_CFG.admission_status==='OPENED');
  smsBalance=SB_CFG.sms_balance||0;
  populateYearSelect(SB_CFG.academic_year); { const my=$('s_admyear'); if(my&amp;&amp;SB_CFG.admission_year) my.value=SB_CFG.admission_year; }
  if(SB_CFG.req_doc_line1!==undefined) docLines=[SB_CFG.req_doc_line1,SB_CFG.req_doc_line2,SB_CFG.req_doc_line3,SB_CFG.req_doc_line4,SB_CFG.req_doc_line5].map(x=>x||'');

  // header identity
  const b=document.getElementById('admBadge'); b.className='adm-badge '+(admissionOpen?'open':'closed');
  document.getElementById('admText').textContent='Admission '+(admissionOpen?'OPEN':'CLOSED');
  if(prof){
    SB_ADMIN_NAME=prof.full_name||SB_ADMIN_NAME||'Admin';
    const nm=$('sbName'); if(nm) nm.textContent=SB_ADMIN_NAME;
    const rl=$('sbRole'); if(rl) rl.textContent=(prof.role==='super_admin'?'Super Admin':'School Admin');
    const av=$('sbAvatar'); if(av){ const parts=String(SB_ADMIN_NAME).trim().split(/\s+/); const ini=((parts[0]||'')[0]||'')+((parts[parts.length-1]||'')[0]||''); av.textContent=(ini||'AD').toUpperCase(); }
  }
  fillSelects();
}

async function populateYearSelect(current){
  const sel=$('s_acadyear'); if(!sel)return;
  const years=new Set();
  const base=new Date().getFullYear()-2;
  for(let y=base;y<=base+9;y++) years.add(y+'/'+(y+1));
  if(current) years.add(current);
  // include any saved (parked) years so they're switchable from the dropdown too
  try{ const {data}=await sb.rpc('list_archived_years',{p_school:SB_SCHOOL.id}); (Array.isArray(data)?data:[]).forEach(r=>{ if(r.academic_year) years.add(r.academic_year); }); }catch(e){}
  const sorted=[...years].sort();
  sel.innerHTML=sorted.map(y=>`<option value=&quot;${y}&quot; ${y===current?'selected':''}>${y}${y===current?' (current)':''}</option>`).join('');
  if(current) sel.value=current;
}
async function saveAcademicConfig(){
  if(roGuard())return;
  if(!SB_SCHOOL){toast('School not loaded');return;}
  const newYear=(val('s_acadyear')||'').trim();
  const newAdmYear=val('s_admyear')?parseInt(val('s_admyear')):null;
  if(!newYear){toast('Academic year is required');return;}
  const curYear=(SB_CFG&amp;&amp;SB_CFG.academic_year)||'';
  if(newYear!==curYear &amp;&amp; curYear){
    // Academic year changed -> SWAP: park current year's data, load the target year's data (or start empty)
    const msg='Switch academic year from &quot;'+curYear+'&quot; to &quot;'+newYear+'&quot;?\n\n'
      +'Your &quot;'+curYear+'&quot; data (students, placements, payments) will be saved and set aside. '
      +'If &quot;'+newYear+'&quot; has saved data it will be loaded back; otherwise the year starts empty.\n\n'
      +'You can switch back any time — nothing is deleted.\n\nContinue?';
    if(!confirm(msg))return;
    toast('Switching to '+newYear+'…');
    const {data,error}=await sb.rpc('switch_academic_year',{p_school:SB_SCHOOL.id,p_new_year:newYear});
    if(error){toast('Switch failed: '+error.message);return;}
    if(!data||!data.ok){toast('Switch failed: '+((data&amp;&amp;data.error)||'unknown'));return;}
    if(newAdmYear) await sb.from('school_config').update({admission_year:newAdmYear}).eq('school_id',SB_SCHOOL.id);
    alert('Academic year is now '+newYear+'.\n\n'+(data.restored
      ? 'Loaded saved data for '+newYear+':\n• '+data.students+' students\n• '+data.placements+' placements\n• '+data.payments+' payments'
      : 'This is a new year — starting empty.')
      +'\n\nYour previous year (&quot;'+(data.old_year||curYear)+'&quot;) was saved and can be switched back to any time.');
    await loadSchoolData({full_name:SB_ADMIN_NAME,role:(SB_PERMS==null?'super_admin':'school_admin'),permissions:SB_PERMS,school_id:(SB_SCHOOL&amp;&amp;SB_SCHOOL.id)||null});
    go('dashboard');
    return;
  }
  // No year change — just persist year/admission-year
  const {error}=await sb.from('school_config').update({academic_year:newYear,admission_year:newAdmYear}).eq('school_id',SB_SCHOOL.id);
  if(error){toast('Could not save: '+error.message);return;}
  if(SB_CFG){SB_CFG.academic_year=newYear;SB_CFG.admission_year=newAdmYear;}
  toast('Admission configuration saved');
}

applyBulk=async function(){

  const patch={}; if(cl)patch.class_id=cMap[cl]; if(ho)patch.house_id=hMap[ho];

sendSms=async function(){
  if(roGuard())return;
  const tpl=(val('smsBody')||'').trim(); if(!tpl){toast('Type a message first');return;}
  const targets=smsTargets(); const n=targets.length;
  if(!n){toast('No recipients with a valid phone number in this group');return;}
  const parts=smsParts(tpl); const cost=parts*n;
  if(cost>smsBalance){toast('Not enough credits — need '+cost+', have '+smsBalance);return;}
  if(!confirm('Send to '+n+' recipient(s)? This will use '+cost+' credit(s).'))return;
  const group=smsGroupLabel();
  const sender=(val('smsSender')||'SCHOOLSMS').slice(0,11);
  const messages=targets.map(s=>({to:(s.sms+'').replace(/\s/g,''),body:personalize(tpl,s)}));
  const btn=event&amp;&amp;event.target?event.target.closest('button'):null; if(btn)btn.textContent='Sending…';
  let status='sent', delivered=n;
  try{
    const {data,error}=await sb.functions.invoke('send-sms',{body:{school_id:SB_SCHOOL.id,sender,messages}});
    if(error) throw error;
    if(data){ delivered=data.sent!=null?data.sent:n; if(data.sent===0)status='failed'; else if(data.failed)status='partial'; }
  }catch(e){
    status='pending';
    toast('Saved, but delivery is not connected yet — set up the SMS provider Edge Function.');
  }
  await sb.from('sms_log').insert({school_id:SB_SCHOOL.id,recipient_group:group,recipients:n,message:tpl,sent_by:(SB_ADMIN_NAME||'Admin'),status});
  if(status!=='pending'){ smsBalance=Math.max(0,smsBalance-cost); await sb.from('school_config').update({sms_balance:smsBalance}).eq('school_id',SB_SCHOOL.id); }
  smsHistory.unshift({date:new Date().toISOString().slice(0,10),group,recip:n,msg:tpl,status});
  document.getElementById('smsBody').value=''; renderSms(); renderStats();
  if(btn)btn.innerHTML='<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><line x1=&quot;22&quot; y1=&quot;2&quot; x2=&quot;11&quot; y2=&quot;13&quot;/><polygon points=&quot;22 2 15 22 11 13 2 9 22 2&quot;/></svg>Send to <span id=&quot;smsRecip&quot;>'+n+'</span> recipients';
  if(status==='sent') toast('Sent to '+delivered+' recipient(s) · '+cost+' credits used');
};

function uploadSchoolCrest(inp){
  const f=inp.files&amp;&amp;inp.files[0]; if(!f){return;} inp.value='';
  if(f.size>2*1024*1024){toast('Please use a crest under 2 MB');return;}
  const img=new Image();
  img.onload=function(){
    let w=img.width,h=img.height; const sc=Math.min(260/w,260/h,1); w=Math.round(w*sc); h=Math.round(h*sc);
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const x=c.getContext('2d'); x.drawImage(img,0,0,w,h);
    try{ const d=x.getImageData(0,0,w,h),p=d.data;
      for(let i=0;i<p.length;i+=4){ if(p[i]>232&amp;&amp;p[i+1]>232&amp;&amp;p[i+2]>232) p[i+3]=0; }
      x.putImageData(d,0,0);
    }catch(e){}
    const uri=c.toDataURL('image/png');
    SCHOOL_CREST=uri;
    const prev=$('s_crest_prev'); if(prev){prev.src=uri;prev.style.display='block';}
    const bm=$('brandCrest'); if(bm){bm.src=uri;bm.style.display='block';} const lt=$('brandLogoText'); if(lt) lt.style.display='none';
    if(window.SB_SCHOOL&amp;&amp;SB_SCHOOL.id){ sb.from('schools').update({crest_url:uri}).eq('id',SB_SCHOOL.id).then(({error})=>{ if(error){toast('Crest set (not saved: '+error.message+')');} else {SB_SCHOOL.crest_url=uri; toast('Crest uploaded &amp; saved');} }); }
    else toast('Crest set');
    URL.revokeObjectURL(img.src);
  };
  img.onerror=function(){toast('Could not read that image');};
  img.src=URL.createObjectURL(f);
}

openClass=function(id){
  if(roGuard())return;

  const pOpts='<option value=&quot;&quot;>— None —</option>'+programmes.map(p=>`<option value=&quot;${p.id}&quot; ${String(c.progId)===String(p.id)?'selected':''}>${p.name}</option>`).join('');

    `<div class=&quot;grid-2&quot;><div class=&quot;field&quot;><label>Class name</label><input id=&quot;c_name&quot; value=&quot;${c.name}&quot;></div><div class=&quot;field&quot;><label>Code</label><input id=&quot;c_code&quot; value=&quot;${c.code||''}&quot;></div></div>

delItem=async function(type,id){
  const map={prog:[programmes,'programmes','Programme'],house:[houses,'houses','House'],class:[classes,'classrooms','Class']};
  const [arr,table,label]=map[type]; const item=arr.find(x=>x.id===id);
  if(!confirm('Delete '+(item.name||item.code)+'?'))return;
  await sb.from(table).delete().eq('id',item._id);
  arr.splice(arr.indexOf(item),1);
  if(type==='prog')renderProg(); if(type==='house')renderHouses(); if(type==='class')renderClasses();
  fillSelects(); toast(label+' deleted');
};

addPlacement=async function(){
  if(roGuard())return;
  const i=val('pl_index').trim(),n=val('pl_name').trim(); if(!i||!n){toast('Index number and full name are required');return;}
  const rec={
    school_id:SB_SCHOOL.id, index_number:i, student_name:n,
    other_names:val('pl_other')||null, gender:val('pl_gender')||null,
    residential_status:val('pl_res')||null, programme:val('pl_prog')||null,
    aggregate: val('pl_agg')? parseInt(val('pl_agg')) : null,
    dob: val('pl_dob')||null, sms_contact:val('pl_sms')||null
  };
  const {error}=await sb.from('placement_list').upsert(rec,{onConflict:'school_id,index_number'});
  if(error){toast('Could not save: '+error.message);return;}
  placement.unshift({index:i,name:n,other:rec.other_names||'',gender:rec.gender||'',res:rec.residential_status||'',prog:rec.programme||'',agg:rec.aggregate,dob:rec.dob||'',sms:rec.sms_contact||'',code:null,loggedIn:false});
  ['pl_index','pl_name','pl_other','pl_gender','pl_res','pl_agg','pl_dob','pl_sms'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderPlacement(); toast('Placement record added');
};

  /* ---------- Charts ---------- */
  .chart-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:18px}
  .chart-box{height:230px;padding:10px 14px 14px;position:relative}

  /* ---------- Forms ---------- */
  .form-grid{display:grid;gap:16px}
  fieldset{border:1px solid var(--line);border-radius:var(--r);padding:18px;background:var(--surface-2)}
  legend{font-family:'Space Grotesk';font-weight:600;font-size:13px;padding:0 8px;color:var(--primary)}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  .field:last-child{margin-bottom:0}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft)}
  .field .hint{font-size:11px;color:var(--muted);font-weight:400}
  input,select,textarea{
    font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);
    border-radius:var(--r-sm);background:var(--surface);color:var(--ink);width:100%;transition:.14s;
  }
  textarea{resize:vertical;min-height:64px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(15,24,21,.5);backdrop-filter:blur(2px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:42px 16px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:660px;box-shadow:0 24px 60px -16px rgba(0,0,0,.4);animation:rise .25s ease}
  .modal.wide{max-width:880px}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-family:'Space Grotesk';font-size:17px;font-weight:600}
  .modal-head p{font-size:12.5px;color:var(--muted);margin-top:2px}
  .modal-x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted);font-size:20px;line-height:1}
  .modal-x:hover{background:var(--surface-2);color:var(--ink)}
  .modal-body{padding:22px;max-height:64vh;overflow-y:auto}
  .modal-foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

  /* ---------- Detail tabs ---------- */
  .tabs{display:flex;gap:3px;border-bottom:1px solid var(--line);padding:0 22px;overflow-x:auto}
  .tab{padding:12px 14px;font-size:12.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.14s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
  .tab-panel{display:none;padding:20px 22px}
  .tab-panel.active{display:block}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:9px 16px;font-size:13px}
  .kv dt{color:var(--muted);font-weight:500}
  .kv dd{font-weight:500}

  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar .search{position:relative;flex:1;min-width:200px}
  .toolbar .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
  .toolbar .search input{padding-left:34px}
  .toolbar select{width:auto;min-width:150px}
  .toolbar .spacer{flex:1}

  .section-title{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin:4px 0 14px}
  .empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty svg{width:34px;height:34px;opacity:.4;margin-bottom:8px}

  /* SMS composer */
  .composer{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
  .char-count{font-size:11.5px;color:var(--muted);margin-top:6px;text-align:right}
  .credit-box{background:var(--primary);color:#fff;border-radius:var(--r);padding:18px}
  .credit-box .big{font-family:'Space Grotesk';font-size:30px;font-weight:600}
  .credit-box small{opacity:.8;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px -8px rgba(0,0,0,.4);z-index:90;transform:translateY(80px);opacity:0;transition:.3s}
  .toast.show{transform:none;opacity:1}
  .toast svg{width:17px;height:17px;color:var(--accent)}

  .backdrop{display:none}
  @media(max-width:1100px){
    .stat-grid{grid-template-columns:repeat(3,1fr)}
    .cols{grid-template-columns:1fr}
    .chart-grid{grid-template-columns:1fr}
  }
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;width:264px;transform:translateX(-100%);transition:transform .25s}
    .sidebar.open{transform:none}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
    .backdrop.show{display:block}
    .hamburger{display:flex}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .content{padding:18px 16px 40px}
    .topbar{padding:12px 16px}
    .clock{display:none}
    .composer{grid-template-columns:1fr}
    .grid-2,.grid-3{grid-template-columns:1fr}
  }
  .env-badge{position:fixed;top:8px;right:10px;z-index:99999;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;padding:4px 9px;border-radius:20px;background:#0C4537;color:#7FE3C2;border:1px solid #1E4F40;box-shadow:0 4px 14px -6px rgba(0,0,0,.5);pointer-events:none}
  .env-badge.dev{background:#5b3a08;color:#FBD37A;border-color:#7a5409}
  .demo-faint{font-size:11.5px;color:#9aa6a1;margin-top:14px;text-align:center;cursor:pointer;user-select:none}
  .demo-faint code{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8A9893;background:transparent}
  .demo-faint:hover{color:var(--primary)}.demo-faint:hover code{color:var(--primary)}
</style>
</head>

    ? `<button class=&quot;act&quot; onclick=&quot;openSchool(${s.id})&quot;>View</button>`

    return `<tr><td><div class=&quot;sch-cell&quot;>${crest(s)}<span class=&quot;sch-name&quot;>${s.name}</span></div></td>

/* ============ CHARTS ============ */
let charts={};
function buildCharts(){
  Object.values(charts).forEach(c=>c&amp;&amp;c.destroy());
  Chart.defaults.font.family=&quot;'Inter',sans-serif&quot;;Chart.defaults.font.size=11;Chart.defaults.color='#8A9893';
  const days=[...Array(30)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return d.getDate()+'/'+(d.getMonth()+1);});
  let base=40;const series=days.map(()=>{base+=Math.round((Math.random()-.35)*14);return Math.max(12,base);});
  charts.trend=new Chart($('trendChart'),{type:'line',data:{labels:days,datasets:[{data:series,borderColor:'#115E4A',backgroundColor:'rgba(17,94,74,.10)',fill:true,tension:.35,borderWidth:2,pointRadius:0,pointHoverRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:7}},y:{grid:{color:'#EEF1EF'},beginAtZero:true}}}});
  const top=[...schools].sort((a,b)=>b.students-a.students).slice(0,5);
  charts.top=new Chart($('topChart'),{type:'bar',data:{labels:top.map(s=>s.short),datasets:[{data:top.map(s=>s.students),backgroundColor:'#115E4A',borderRadius:6,barThickness:24}]},

  const rev=schools.map(s=>({n:s.short,v:s.students*s.charge}));
  charts.rev=new Chart($('revChart'),{type:'doughnut',data:{labels:rev.map(r=>r.n),datasets:[{data:rev.map(r=>r.v),backgroundColor:crestColors,borderWidth:2,borderColor:'#fff'}]},

}

/* ============ SMS LOGIC ============ */
function recipientCount(){
  const t=$('smsTarget').value;const g=$('smsGroup').value;
  let pool=t==='all'?students:students.filter(s=>s.schoolId==t);
  if(g!=='all')pool=pool.filter(s=>s.status===g);
  const ratio=totalStudents()/students.length;
  return Math.round(pool.length*ratio);
}
function updateSmsCount(){
  const len=($('smsBody').value||'').length;
  $('smsChars').textContent=len;$('smsCredits').textContent=Math.max(1,Math.ceil(len/160));
  $('smsRecip').textContent=fmt(recipientCount());
}
function loadTemplate(v){
  const t={approved:'Your admission has been approved. Admission No: {ADM}. Report on 18 Oct 2025.',reminder:'Reminder: Reporting date is 18 Oct 2025. Bring all required documents.',payment:'Payment received. Your admission token is {TOKEN}. Use it with your index number to log in.'};
  if(t[v]){$('smsBody').value=t[v];updateSmsCount();}
}
function sendBulkSms(){
  const body=($('smsBody').value||'').trim();if(!body){toast('Type a message first');return;}
  const n=recipientCount();const credits=Math.max(1,Math.ceil(body.length/160))*n;
  if(credits>smsBalance){toast('Not enough credits for this broadcast');return;}
  smsBalance-=credits;
  const t=$('smsTarget').value;
  smsHistory.unshift({date:new Date().toISOString().slice(0,10),school:t==='all'?schools[0].id:parseInt(t),group:$('smsGroup').selectedOptions[0].text.replace(' students',''),recip:n,msg:body,status:'sent'});
  $('smsBody').value='';renderSms();renderStats();
  toast(`SMS sent to ${fmt(n)} recipients · ${fmt(credits)} credits used`);
}

<script>
/* ================= SUPABASE INTEGRATION (super admin) ================= */
const SB_URL='https://datxaylostmyroleisdl.supabase.co';
const SB_KEY='sb_publishable_c9WlfiojT_wz4uesb3lYaw_91QoIErh';
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
(function(){var b=document.getElementById('envBadge');if(!b)return;var prod=SB_URL.indexOf('datxaylostmyroleisdl')>-1;b.textContent=prod?'● PRODUCTION':'● DEV / DEMO';b.className='env-badge'+(prod?'':' dev');})();
const sval=id=>document.getElementById(id).value;
const sa_init=n=>{const w=(n||'').replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean);return ((w[0]&amp;&amp;w[0][0]||'S')+(w[1]&amp;&amp;w[1][0]||(w[0]&amp;&amp;w[0][1])||'C')).toUpperCase();};
const sa_cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
const sa_time=ts=>{ if(!ts)return '—'; const d=new Date(ts),n=new Date(),m=Math.floor((n-d)/60000);
  return m<1?'just now':m<60?m+' min ago':m<1440?Math.floor(m/60)+' hr ago':Math.floor(m/1440)+'d ago'; };

/* ---- AUTH GATE ---- */

  const ov=document.createElement('div'); ov.id='authGate';

  ov.innerHTML=`<div style=&quot;width:100%;max-width:400px&quot;>
    <div style=&quot;text-align:center;margin-bottom:18px&quot;>

      <div class=&quot;field&quot;><label>Password</label><input id=&quot;ag_pass&quot; type=&quot;password&quot; placeholder=&quot;••••••••&quot;></div>
      <div id=&quot;ag_err&quot; style=&quot;display:none;color:#B23A3A;font-size:12.5px;font-weight:500;margin-bottom:10px&quot;></div>
      <button class=&quot;btn btn-primary&quot; style=&quot;width:100%;justify-content:center&quot; id=&quot;ag_btn&quot;>Sign in</button>

async function superLogin(){
  const btn=document.getElementById('ag_btn'),err=document.getElementById('ag_err');
  btn.textContent='Signing in…'; err.style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email:sval('ag_email').trim(),password:sval('ag_pass')});
  if(error){err.textContent=error.message;err.style.display='block';btn.textContent='Sign in';return;}
  const {data:prof}=await sb.from('profiles').select('role,full_name').eq('id',data.user.id).single();
  if(!prof||prof.role!=='super_admin'){err.textContent='This account is not a super admin.';err.style.display='block';btn.textContent='Sign in';await sb.auth.signOut();return;}
  SA_UID=data.user.id;
  try{ await loadSA(); }catch(e){ err.textContent='Could not load platform data.'; err.style.display='block'; btn.textContent='Sign in'; return; }
  document.getElementById('authGate').remove();
  document.querySelector('.app').style.display='';
  go('dashboard');
}
async function logout(){ if(!confirm('Log out of the Super Admin portal?'))return; try{ await sb.auth.signOut(); }catch(e){} location.reload(); }

async function loadSA(){
  const [sch,cfg,prof,stu,pay,sms,log,progs]=await Promise.all([
    sb.from('schools').select('*').order('created_at'),
    sb.from('school_config').select('school_id,admission_status,service_charge,sms_balance'),
    sb.from('profiles').select('id,full_name,email,school_id,role'),
    sb.from('students').select('school_id,bece_index,full_name,programme_id,status,created_at'),
    sb.from('payments').select('amount_pesewas,channel,status,reference,school_id,paid_at,created_at,payer_name, students(full_name)'),
    sb.from('sms_log').select('*').order('sent_at',{ascending:false}),
    sb.from('activity_log').select('*').order('created_at',{ascending:false}),
    sb.from('programmes').select('id,name'),
  ]);
  const cfgBy={}; (cfg.data||[]).forEach(c=>cfgBy[c.school_id]=c);
  const adminBy={}; (prof.data||[]).forEach(p=>{ if(p.role==='school_admin'&amp;&amp;p.school_id) adminBy[p.school_id]=p.full_name; });
  const schNameById={}; (sch.data||[]).forEach(s=>schNameById[s.id]=s.name);
  admins=(prof.data||[]).map(p=>({uid:p.id,name:p.full_name||'—',email:p.email||'—',role:p.role,
    school:p.role==='super_admin'?'All schools':(schNameById[p.school_id]||'—')}));
  const pName={}; (progs.data||[]).forEach(p=>pName[p.id]=p.name);
  const sRev={};
  schools=(sch.data||[]).map((s,i)=>{ const id=i+1; sRev[s.id]=id; const c=cfgBy[s.id]||{};
    return {id,_id:s.id,code:s.code,name:s.name,short:sa_init(s.name),admin:adminBy[s.id]||'—',
      plan:sa_cap(s.subscription_plan||'standard'),students:(stu.data||[]).filter(x=>x.school_id===s.id).length,
      admission:c.admission_status||'CLOSED',status:s.status,charge:Number(c.service_charge||0),
      expiry:s.subscription_expiry||'—',email:s.email||'',phone:s.phone||'',color:i%crestColors.length}; });
  nextSchoolId=schools.length+1;
  students=(stu.data||[]).map(s=>({name:s.full_name||'(no name)',index:s.bece_index,schoolId:sRev[s.school_id],programme:pName[s.programme_id]||'—',status:s.status,reg:(s.created_at||'').slice(0,10)}));
  window._todayReg=students.filter(s=>s.reg===new Date().toISOString().slice(0,10)).length;
  payments=(pay.data||[]).map(p=>({date:(p.paid_at||p.created_at||'').slice(0,10),student:(p.students&amp;&amp;p.students.full_name)||p.payer_name||'—',schoolId:sRev[p.school_id],amount:(p.amount_pesewas||0)/100,method:sa_cap(p.channel),status:p.status,txn:p.reference||'—'}));
  smsHistory=(sms.data||[]).map(s=>({date:(s.sent_at||'').slice(0,10),school:sRev[s.school_id],group:s.recipient_group,recip:s.recipients,msg:s.message,status:s.status}));
  activity=(log.data||[]).map(l=>({type:'sys',school:sRev[l.school_id],text:l.action,time:sa_time(l.created_at)}));
  smsBalance=(cfg.data||[]).reduce((a,c)=>a+(c.sms_balance||0),0);
  renderAll();
}

/* ---- PERSISTING OVERRIDES ---- */
toggleAdmission=async function(id){
  const s=sById(id); s.admission=s.admission==='OPENED'?'CLOSED':'OPENED';
  await sb.from('school_config').update({admission_status:s.admission}).eq('school_id',s._id);
  activity.unshift({type:'sys',school:id,text:'Admission '+s.admission.toLowerCase()+' by Super Admin',time:'just now'});
  renderSchools(); renderDashTable(); renderFeed(); renderStats();
  toast(s.name+': admission '+s.admission);
};
suspendSchool=async function(id){
  const s=sById(id); s.status=s.status==='suspended'?'active':'suspended';
  await sb.from('schools').update({status:s.status}).eq('id',s._id);
  closeModal(); renderSchools(); renderStats(); renderDashTable();
  toast(s.name+' '+(s.status==='suspended'?'suspended':'reactivated'));
};
deleteSchool=async function(id){
  const s=sById(id); if(!confirm('Delete '+s.name+'? This removes the school and all its data.'))return;
  const {error}=await sb.from('schools').delete().eq('id',s._id);
  if(error){toast('Could not delete: '+error.message);return;}
  closeModal(); await loadSA(); go('schools'); toast(s.name+' deleted');
};
saveAdminEdit=async function(uid){
  const a=admins.find(x=>x.uid===uid); if(!a)return;
  const name=(sval('ea_name')||'').trim(); const pass=sval('ea_pass')||'';
  if(!name){toast('Name is required');return;}
  const btn=$('ea_btn'); if(btn)btn.textContent='Saving…';
  const {error}=await sb.from('profiles').update({full_name:name}).eq('id',uid);
  if(error){ if(btn)btn.textContent='Save changes'; toast('Could not save: '+error.message); return; }
  if(pass){
    if(pass.length<8){ if(btn)btn.textContent='Save changes'; toast('Password must be at least 8 characters'); return; }
    const {data,error:pe}=await sb.functions.invoke('manage-user',{body:{action:'password',user_id:uid,password:pass}});
    if(pe||(data&amp;&amp;data.error)){ if(btn)btn.textContent='Save changes'; toast('Name saved, but password change failed: '+((data&amp;&amp;data.message)||(pe&amp;&amp;pe.message)||'error')); await loadSA(); go('admins'); return; }
  }
  closeModal(); await loadSA(); go('admins'); toast(name+' updated');
};
deleteAdmin=async function(uid){
  const a=admins.find(x=>x.uid===uid); if(!a)return;
  if(uid===SA_UID){toast('You cannot delete your own account.');return;}
  if(!confirm('Delete admin '+a.name+' ('+a.email+')? They lose access immediately. This cannot be undone.'))return;
  const {data,error}=await sb.functions.invoke('manage-user',{body:{action:'delete',user_id:uid}});
  if(error||(data&amp;&amp;data.error)){toast('Could not delete: '+((data&amp;&amp;data.message)||(error&amp;&amp;error.message)||'error'));return;}
  await loadSA(); go('admins'); toast(a.name+' removed');
};
resetAdminPwd=async function(uid){
  const a=admins.find(x=>x.uid===uid); if(!a)return;
  if(uid===SA_UID){toast('Reset your own password from Supabase, not here.');return;}
  const pass=genStr(10);
  if(!confirm('Reset password for '+a.name+'?\n\nNew temporary password:\n'+pass+'\n\nClick OK to set it.'))return;
  const {data,error}=await sb.functions.invoke('manage-user',{body:{action:'password',user_id:uid,password:pass}});
  if(error||(data&amp;&amp;data.error)){toast('Could not reset: '+((data&amp;&amp;data.message)||(error&amp;&amp;error.message)||'error'));return;}
  alert('New password for '+a.email+':\n\n'+pass+'\n\nShare it with them; they can change it after signing in.');
  toast('Password reset for '+a.name);
};
saveSchoolEdit=async function(id){
  const s=sById(id); if(!s)return;
  const name=(sval('e_name')||'').trim(), code=(sval('e_code')||'').trim().toUpperCase();
  if(!name||!code){toast('School code and name are required');return;}
  const btn=$('e_btn'); if(btn)btn.textContent='Saving…';
  const {error}=await sb.from('schools').update({
    name, code, phone:sval('e_phone'), email:sval('e_email'),
    subscription_plan:(sval('e_plan')||'Standard').toLowerCase(), subscription_expiry:sval('e_expiry')||null, status:sval('e_status')
  }).eq('id',s._id);
  if(error){ if(btn)btn.textContent='Save changes'; toast('Could not save: '+error.message); return; }
  await sb.from('school_config').update({ service_charge:parseFloat(sval('e_charge'))||0, admission_status:sval('e_admission') }).eq('school_id',s._id);
  await sb.from('activity_log').insert({school_id:s._id,actor:'Super Admin',action:'School information updated'});
  closeModal(); await loadSA(); go('schools'); toast(name+' updated');
};
createSchool=async function(){
  const code=sval('f_code').trim().toUpperCase(), name=sval('f_name').trim();
  if(!code||!name){toast('School code and name are required');return;}
  const {data:school,error}=await sb.from('schools').insert({
    code,name,phone:sval('f_phone'),email:sval('f_aemail')||sval('f_email'),
    subscription_plan:sval('f_plan').toLowerCase(),subscription_expiry:sval('f_expiry')||null,status:'active'
  }).select().single();
  if(error){toast('Could not create: '+error.message);return;}
  await sb.from('school_config').insert({school_id:school.id,service_charge:parseFloat(sval('f_charge'))||30,admission_status:sval('f_admission')});
  await sb.from('activity_log').insert({school_id:school.id,actor:'Super Admin',action:'New school created'});
  closeModal(); await loadSA(); go('schools');
  toast(name+' created — provision its admin login from Supabase Auth');
};
createAdmin=async function(){
  const s=sById(parseInt(sval('a_school')));
  const email=(sval('a_email')||'').trim(), name=(sval('a_name')||'').trim(), pass=sval('a_pass')||'';
  if(!s){toast('Pick a school first');return;}
  if(!email||!pass){toast('Email and a temporary password are required');return;}
  if(pass.length<8){toast('Password must be at least 8 characters');return;}
  const btn=$('a_btn'); if(btn)btn.textContent='Creating…';
  const {data,error}=await sb.functions.invoke('create-school-admin',{body:{email,password:pass,full_name:name,school_id:s._id}});
  if(btn)btn.textContent='Create admin';
  if(error||(data&amp;&amp;data.error)){toast('Could not create: '+((data&amp;&amp;data.message)||(error&amp;&amp;error.message)||'error'));return;}
  closeModal(); await loadSA(); go('admins');
  toast(name+' can now sign in with '+email);
};
sendBulkSms=async function(){
  const body=(document.getElementById('smsBody').value||'').trim(); if(!body){toast('Type a message first');return;}
  const n=recipientCount(); const credits=Math.max(1,Math.ceil(body.length/160))*n;
  if(credits>smsBalance){toast('Not enough credits for this broadcast');return;}
  smsBalance-=credits;
  const t=document.getElementById('smsTarget').value;
  const group=document.getElementById('smsGroup').selectedOptions[0].text.replace(' students','');
  if(t!=='all'){ const s=sById(parseInt(t)); if(s) await sb.from('sms_log').insert({school_id:s._id,recipient_group:group,recipients:n,message:body,sent_by:'Super Admin',status:'sent'}); }
  smsHistory.unshift({date:new Date().toISOString().slice(0,10),school:t==='all'?schools[0].id:parseInt(t),group,recip:n,msg:body,status:'sent'});
  document.getElementById('smsBody').value=''; renderSms(); renderStats();
  toast('SMS sent to '+fmt(n)+' recipients · '+fmt(credits)+' credits used');
};
