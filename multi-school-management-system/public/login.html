<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Multi-School Management System</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand">
      <div>
        <div class="brand-mark"><i class="fa-solid fa-school"></i></div>
        <h1>Multi-School Management System</h1>
        <p class="lead">Secure school operations, staff workflows, results, documents, SMS, and clearance on one Supabase-backed platform.</p>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <span class="status-pill">Supabase Auth</span>
        <span class="status-pill">School ID Isolation</span>
        <span class="status-pill">Responsive Portals</span>
      </div>
    </section>
    <section class="login-card">
      <h2 class="h3 mb-2">Sign in</h2>
      <p class="text-secondary mb-4">Use your assigned school account.</p>
      <form data-login-form class="row g-3">
        <div class="col-12">
          <label class="form-label" for="email">Email</label>
          <input class="form-control form-control-lg" id="email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="col-12">
          <label class="form-label" for="password">Password</label>
          <input class="form-control form-control-lg" id="password" name="password" type="password" required autocomplete="current-password">
        </div>
        <div class="col-12">
          <button class="btn btn-primary btn-lg w-100" type="submit"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
        </div>
      </form>
      <hr class="my-4">
      <form data-reset-form class="row g-2">
        <div class="col-12">
          <label class="form-label" for="reset_email">Reset password</label>
          <input class="form-control" id="reset_email" name="reset_email" type="email" placeholder="name@school.edu">
        </div>
        <div class="col-12">
          <button class="btn btn-outline-secondary w-100" type="submit"><i class="fa-solid fa-key me-2"></i>Send reset link</button>
        </div>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../assets/js/pages/login.js?v=fresh-rebuild"></script>
</body>
</html>
